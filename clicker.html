<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flappy Premium — идеальная версия</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0e1a 0%, #1a2a3a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, sans-serif;
            padding: 20px;
        }

        /* ГЛАВНЫЙ КОНТЕЙНЕР */
        .main-container {
            background: rgba(10, 20, 35, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            background: #0b1120;
            width: 100%;
            height: auto;
        }

        /* МЕНЮ */
        .menu {
            text-align: center;
            color: white;
            width: 400px;
            position: relative;
        }

        .menu h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #FFE6B0, #FF8C1A);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 18px;
            align-items: center;
            margin: 30px 0;
        }

        .menu-btn {
            background: linear-gradient(95deg, #FFB347, #FF8C1A);
            border: none;
            padding: 14px 45px;
            width: 240px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #1e1a0c;
            cursor: pointer;
            transition: 0.07s linear;
            text-align: center;
            box-shadow: 0 6px 0 #8B4500;
        }
        .menu-btn:active { transform: translateY(2px); box-shadow: 0 3px 0 #8B4500; }

        /* СЕТКА ПЕРСОНАЖЕЙ */
        .characters-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 25px 0;
        }
        .char-card {
            background: linear-gradient(145deg, #232842, #1a1e32);
            border-radius: 35px;
            padding: 12px 6px;
            text-align: center;
            cursor: pointer;
            transition: 0.07s linear;
            border: 2px solid rgba(255, 200, 100, 0.6);
            box-shadow: 0 6px 0 #0b0f1a;
        }
        .char-card:active { transform: translateY(2px); box-shadow: 0 3px 0 #0b0f1a; }
        .char-card.selected {
            border: 3px solid #FFD966;
            background: linear-gradient(145deg, #2f365a, #222845);
            box-shadow: 0 0 15px rgba(255, 200, 80, 0.6);
        }
        .char-emoji { font-size: 48px; display: block; margin-bottom: 5px; }
        .char-name { font-size: 0.9rem; font-weight: bold; color: #FFE5B4; }
        .char-badge { font-size: 0.7rem; color: #A5D6FF; background: #0f1322; display: inline-block; padding: 2px 10px; border-radius: 30px; margin-top: 5px; }

        .back-btn {
            background: #3a405e;
            box-shadow: 0 5px 0 #1e2238;
            width: 180px;
            margin-top: 10px;
            color: #f0f0f0;
        }

        /* ИГРОВАЯ ПАНЕЛЬ */
        .game-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            gap: 12px;
            background: #0c1022cc;
            backdrop-filter: blur(16px);
            border-radius: 60px;
            padding: 8px 20px;
            border: 1px solid rgba(255,215,0,0.4);
        }
        .score-box, .best-box {
            background: #010118cc;
            padding: 6px 20px;
            border-radius: 50px;
            color: #FFE484;
            font-weight: bold;
            font-size: 1.2rem;
            border: 1px solid #ffc107;
            font-family: monospace;
        }
        .best-box { color: #AAFFAA; border-color: #8aff80; }
        .game-btn {
            background: #FFA347;
            border: none;
            padding: 6px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #a05100;
        }
        .game-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #a05100; }
        .hint {
            background: #000000aa;
            padding: 5px 14px;
            border-radius: 50px;
            color: #ddd;
            font-size: 0.65rem;
        }
        .pause-btn {
            background: #3a405e;
            box-shadow: 0 3px 0 #1e2238;
            font-size: 1rem;
            padding: 6px 16px;
        }
        .hidden { display: none; }
        
        /* Кнопка рестарта по центру */
        .restart-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #FFB347, #FF8C1A);
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #1e1a0c;
            cursor: pointer;
            box-shadow: 0 6px 0 #8B4500;
            z-index: 100;
            white-space: nowrap;
        }
        .restart-overlay:active { transform: translate(-50%, -50%) translateY(2px); box-shadow: 0 3px 0 #8B4500; }
        .game-wrapper { position: relative; display: inline-block; }
    </style>
</head>
<body>
<div class="main-container">
    <!-- МЕНЮ ГЛАВНОЕ -->
    <div id="mainMenu" class="menu">
        <h1>✨ FLAPPY PREMIUM ✨</h1>
        <canvas id="menuCanvas" width="400" height="120" style="border-radius: 20px; margin-bottom: 10px;"></canvas>
        <div class="menu-buttons">
            <div class="menu-btn" id="playBtn">🎮 ИГРАТЬ</div>
            <div class="menu-btn" id="charactersBtn">👥 ПЕРСОНАЖИ</div>
        </div>
    </div>

    <!-- ВЫБОР ПЕРСОНАЖА -->
    <div id="charMenu" class="menu hidden">
        <h1>🌟 ВЫБЕРИ ГЕРОЯ</h1>
        <div class="characters-grid" id="charGrid"></div>
        <div class="menu-btn back-btn" id="backToMenuBtn">◀ НАЗАД</div>
    </div>

    <!-- ИГРА -->
    <div id="gameWrapper" class="game-wrapper hidden">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <button id="restartOverlayBtn" class="restart-overlay hidden">🔄 НАЧАТЬ ЗАНОВО</button>
    </div>
    <div id="gameUI" class="game-panel hidden">
        <div class="score-box">🏆 <span id="scoreValue">0</span></div>
        <div class="best-box">⭐ <span id="bestValue">0</span></div>
        <button id="pauseGameBtn" class="game-btn pause-btn">⏸️ ПАУЗА</button>
        <span class="hint">🖱️ ПРОБЕЛ / КЛИК</span>
        <button id="menuFromGameBtn" class="game-btn">🏠 МЕНЮ</button>
    </div>
</div>

<script>
    (function(){
        // ---------- ПЕРСОНАЖИ ----------
        const CHARACTERS = [
            { id: 'bird', name: 'ПТИЦА', emoji: '🐦', draw: drawBird },
            { id: 'sponge', name: 'СПАНЧ БОБ', emoji: '🍍', draw: drawSponge },
            { id: 'kolobok', name: 'КОЛОБОК', emoji: '🍞', draw: drawKolobok },
            { id: 'cat', name: 'КОТ', emoji: '🐱', draw: drawCat },
            { id: 'robot', name: 'РОБОТ', emoji: '🤖', draw: drawRobot }
        ];
        let currentCharId = localStorage.getItem('flappyChar') || 'bird';
        
        // DOM
        const mainMenu = document.getElementById('mainMenu');
        const charMenu = document.getElementById('charMenu');
        const gameWrapper = document.getElementById('gameWrapper');
        const canvas = document.getElementById('gameCanvas');
        const menuCanvas = document.getElementById('menuCanvas');
        const gameUI = document.getElementById('gameUI');
        const restartOverlay = document.getElementById('restartOverlayBtn');
        const ctx = canvas.getContext('2d');
        const menuCtx = menuCanvas.getContext('2d');
        const W = 400, H = 600;
        canvas.width = W; canvas.height = H;
        menuCanvas.width = 400; menuCanvas.height = 120;
        
        // ИГРОВЫЕ ПАРАМЕТРЫ
        let gameRunning = true;
        let paused = false;
        let deathAnimation = false;
        let deathTimer = null;
        let score = 0;
        let bestScore = localStorage.getItem('flappyPremiumBest') ? parseInt(localStorage.getItem('flappyPremiumBest')) : 0;
        let birdY = H/2 - 18;
        let birdVel = 0;
        let birdAngle = 0;
        const GRAVITY = 0.35;
        const JUMP_POWER = -6.2;
        let pipes = [];
        const PIPE_WIDTH = 56, PIPE_GAP = 158, PIPE_SPACING = 210;
        let gameSpeed = 2.5;
        const BASE_SPEED = 2.5;
        
        const CHAR_WIDTH = 32, CHAR_HEIGHT = 32;
        const birdX = 70;
        
        // Анимация смерти
        let deathRotation = 0, deathAlpha = 1, deathFallY = 0;
        
        // Анимация меню (летящая птица)
        let menuBirdX = 50;
        let menuBirdY = 50;
        let menuBirdVel = 0;
        let menuFrame = 0;
        
        // UI
        const scoreSpan = document.getElementById('scoreValue');
        const bestSpan = document.getElementById('bestValue');
        bestSpan.innerText = bestScore;
        function updateScoreUI() { scoreSpan.innerText = Math.floor(score); }
        function updateBestUI() { bestSpan.innerText = bestScore; }
        function saveBest() { let s = Math.floor(score); if(s > bestScore) { bestScore = s; localStorage.setItem('flappyPremiumBest', bestScore); updateBestUI(); } }
        
        // Трубы
        function addPipe() {
            let minTop = 50, maxTop = H - PIPE_GAP - 60;
            if(maxTop <= minTop) maxTop = minTop + 50;
            let topHeight = Math.floor(Math.random() * (maxTop - minTop + 1) + minTop);
            pipes.push({ x: W, topHeight: topHeight, bottomY: topHeight + PIPE_GAP, counted: false });
        }
        
        function resetGame() {
            if(deathTimer) clearTimeout(deathTimer);
            deathAnimation = false;
            deathRotation = 0; deathAlpha = 1; deathFallY = 0;
            gameRunning = true;
            paused = false;
            score = 0; updateScoreUI();
            birdY = H/2 - 18; birdVel = 0; birdAngle = 0;
            pipes = []; gameSpeed = BASE_SPEED;
            addPipe(); addPipe();
            if(pipes[0]) pipes[0].x = W;
            if(pipes[1]) pipes[1].x = W + PIPE_SPACING;
            restartOverlay.classList.add('hidden');
        }
        
        function flap() { 
            if(gameRunning && !deathAnimation && !paused) {
                birdVel = JUMP_POWER;
                birdAngle = -25;
            }
        }
        
        function togglePause() {
            if(!gameRunning || deathAnimation) return;
            paused = !paused;
            const pauseBtn = document.getElementById('pauseGameBtn');
            pauseBtn.textContent = paused ? '▶️ ИГРАТЬ' : '⏸️ ПАУЗА';
        }
        
        function startDeathAnimation() {
            if(deathAnimation) return;
            gameRunning = false;
            deathAnimation = true;
            deathRotation = 0;
            deathAlpha = 1;
            deathFallY = birdY;
            saveBest();
            let fallInterval = setInterval(() => {
                if(!deathAnimation) { clearInterval(fallInterval); return; }
                deathFallY += 5;
                deathRotation += 15;
                deathAlpha -= 0.04;
                if(deathFallY > H + 50 || deathAlpha <= 0) {
                    clearInterval(fallInterval);
                    deathAnimation = false;
                    restartOverlay.classList.remove('hidden');
                }
            }, 30);
        }
        
        // ЛОГИКА ИГРЫ
        function updateGame() {
            if(!gameRunning || deathAnimation || paused) return;
            
            // Анимация угла птицы
            if(birdAngle < 20) birdAngle += 2;
            birdVel += GRAVITY;
            birdY += birdVel;
            
            if(birdY <= 0 || birdY + CHAR_HEIGHT >= H) {
                startDeathAnimation();
                return;
            }
            
            for(let i=0;i<pipes.length;i++) {
                const p = pipes[i];
                p.x -= gameSpeed;
                if(birdX + CHAR_WIDTH > p.x && birdX < p.x + PIPE_WIDTH &&
                   (birdY < p.topHeight || birdY + CHAR_HEIGHT > p.bottomY)) {
                    startDeathAnimation();
                    return;
                }
                if(!p.counted && birdX > p.x + PIPE_WIDTH) {
                    p.counted = true;
                    score += 1; updateScoreUI(); saveBest();
                    if(gameSpeed < 5.5) gameSpeed = BASE_SPEED + Math.floor(score/22) * 0.18;
                    if(gameSpeed > 5.5) gameSpeed = 5.5;
                }
            }
            pipes = pipes.filter(p => p.x + PIPE_WIDTH > 0);
            if(pipes.length === 0 || pipes[pipes.length-1].x < W - PIPE_SPACING) addPipe();
        }
        
        // ОТРИСОВКА ПЕРСОНАЖЕЙ
        function drawBird(ctx, x, y, rot, alpha, size=1) {
            ctx.save();
            ctx.translate(x+16, y+16);
            ctx.rotate(rot * Math.PI/180);
            ctx.globalAlpha = alpha;
            ctx.fillStyle = '#FFD966'; ctx.beginPath(); ctx.ellipse(0, 0, 16*size, 14*size, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#E69500'; ctx.beginPath(); ctx.ellipse(8*size, -6*size, 7*size, 6*size, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#000'; ctx.fillRect(9*size, -7*size, 4*size, 5*size);
            ctx.fillStyle = '#E65C1E'; ctx.beginPath(); ctx.moveTo(-6*size, 4*size); ctx.lineTo(-22*size, -1*size); ctx.lineTo(-8*size, 12*size); ctx.fill();
            ctx.restore();
        }
        
        function drawSponge(ctx, x, y, rot, alpha, size=1) {
            ctx.save();
            ctx.translate(x+16, y+16);
            ctx.rotate(rot * Math.PI/180);
            ctx.globalAlpha = alpha;
            ctx.fillStyle = '#F7D44A'; ctx.fillRect(-12*size, -12*size, 28*size, 28*size);
            ctx.fillStyle = '#B9770E';
            for(let i=0;i<4;i++){ ctx.fillRect((-8+i*6)*size, -8*size, 3*size, 6*size); ctx.fillRect((-8+i*6)*size, 4*size, 3*size, 6*size);}
            ctx.fillStyle = '#000'; ctx.fillRect(-6*size, -2*size, 4*size, 5*size); ctx.fillRect(4*size, -2*size, 4*size, 5*size);
            ctx.fillStyle = '#6B4C2C'; ctx.fillRect(-2*size, 9*size, 6*size, 4*size);
            ctx.restore();
        }
        
        function drawKolobok(ctx, x, y, rot, alpha, size=1) {
            ctx.save();
            ctx.translate(x+16, y+16);
            ctx.rotate(rot * Math.PI/180);
            ctx.globalAlpha = alpha;
            ctx.fillStyle = '#E8B86B'; ctx.beginPath(); ctx.arc(0, 0, 16*size, 0, 2*Math.PI); ctx.fill();
            ctx.fillStyle = '#8B5A2B'; ctx.fillRect(-8*size, -5*size, 4*size, 5*size); ctx.fillRect(6*size, -5*size, 4*size, 5*size);
            ctx.fillStyle = '#D2691E'; ctx.beginPath(); ctx.arc(0, 9*size, 6*size, 0, Math.PI); ctx.fill();
            ctx.restore();
        }
        
        function drawCat(ctx, x, y, rot, alpha, size=1) {
            ctx.save();
            ctx.translate(x+16, y+16);
            ctx.rotate(rot * Math.PI/180);
            ctx.globalAlpha = alpha;
            ctx.fillStyle = '#F5AC78'; ctx.fillRect(-11*size, -11*size, 24*size, 26*size);
            ctx.fillStyle = '#E08E4A';
            ctx.beginPath(); ctx.moveTo(-11*size, -11*size); ctx.lineTo(-16*size, -16*size); ctx.lineTo(-4*size, -11*size); ctx.fill();
            ctx.beginPath(); ctx.moveTo(13*size, -11*size); ctx.lineTo(18*size, -16*size); ctx.lineTo(6*size, -11*size); ctx.fill();
            ctx.fillStyle = '#000'; ctx.fillRect(-5*size, -3*size, 4*size, 5*size); ctx.fillRect(4*size, -3*size, 4*size, 5*size);
            for(let i=0;i<3;i++) ctx.fillRect((-10+i*8)*size, 11*size, 2*size, 4*size);
            ctx.restore();
        }
        
        function drawRobot(ctx, x, y, rot, alpha, size=1) {
            ctx.save();
            ctx.translate(x+16, y+16);
            ctx.rotate(rot * Math.PI/180);
            ctx.globalAlpha = alpha;
            ctx.fillStyle = '#7FC5FF'; ctx.fillRect(-12*size, -13*size, 26*size, 28*size);
            ctx.fillStyle = '#4C7AB3'; ctx.fillRect(-6*size, -20*size, 14*size, 8*size);
            ctx.fillStyle = '#000'; ctx.fillRect(-5*size, -4*size, 4*size, 5*size); ctx.fillRect(4*size, -4*size, 4*size, 5*size);
            ctx.fillStyle = '#0FF'; ctx.fillRect(-3*size, 6*size, 8*size, 4*size);
            for(let i=0;i<2;i++) ctx.fillRect((-9+i*18)*size, 12*size, 3*size, 4*size);
            ctx.restore();
        }
        
        function drawCurrentChar(ctx, x, y, rot, alpha, size=1) {
            const char = CHARACTERS.find(c => c.id === currentCharId);
            if(char && char.draw) char.draw(ctx, x, y, rot, alpha, size);
            else drawBird(ctx, x, y, rot, alpha, size);
        }
        
        // ОТРИСОВКА ИГРЫ
        function draw() {
            ctx.clearRect(0, 0, W, H);
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#0F172A'); grad.addColorStop(1, '#1E293B');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
            
            for(let p of pipes) {
                ctx.fillStyle = '#2F6B47CC'; ctx.fillRect(p.x, 0, PIPE_WIDTH, p.topHeight);
                ctx.fillStyle = '#A8E6A0CC'; ctx.fillRect(p.x+5, p.topHeight-38, PIPE_WIDTH-10, 38);
                ctx.fillStyle = '#2F6B47CC'; ctx.fillRect(p.x, p.bottomY, PIPE_WIDTH, H-p.bottomY);
                ctx.fillStyle = '#A8E6A0CC'; ctx.fillRect(p.x+5, p.bottomY, PIPE_WIDTH-10, 38);
            }
            
            if(deathAnimation) {
                drawCurrentChar(ctx, birdX, deathFallY, deathRotation, deathAlpha);
            } else {
                drawCurrentChar(ctx, birdX, birdY, birdAngle, 1);
            }
            
            ctx.font = "bold 46px 'Segoe UI'"; ctx.fillStyle = '#FFF7E8';
            ctx.fillText(Math.floor(score), W/2-22, 75);
            ctx.font = "bold 12px monospace"; ctx.fillStyle = '#B0E0E6';
            ctx.fillText("speed: "+gameSpeed.toFixed(1), W-72, 28);
            
            if(paused && !deathAnimation && gameRunning) {
                ctx.font = "bold 28px 'Segoe UI'"; ctx.fillStyle = '#FFE484';
                ctx.fillText("⏸ ПАУЗА", W/2-55, H/2);
            }
        }
        
        // МЕНЮ С ЛЕТЯЩЕЙ ПТИЦЕЙ
        function drawMenu() {
            menuCtx.clearRect(0, 0, 400, 120);
            const grad = menuCtx.createLinearGradient(0, 0, 0, 120);
            grad.addColorStop(0, '#1E3A5F'); grad.addColorStop(1, '#0F2A4A');
            menuCtx.fillStyle = grad; menuCtx.fillRect(0, 0, 400, 120);
            
            // Облака
            menuCtx.fillStyle = 'rgba(255,255,240,0.3)';
            menuCtx.beginPath(); menuCtx.ellipse(80, 30, 35, 25, 0, 0, Math.PI*2); menuCtx.fill();
            menuCtx.beginPath(); menuCtx.ellipse(320, 50, 40, 28, 0, 0, Math.PI*2); menuCtx.fill();
            
            // Летящая птица
            menuBirdVel += 0.15;
            menuBirdX += 2;
            menuBirdY = 50 + Math.sin(menuFrame * 0.1) * 8;
            if(menuBirdX > 380) menuBirdX = 20;
            drawCurrentChar(menuCtx, menuBirdX, menuBirdY, Math.sin(menuFrame * 0.2) * 15, 1, 0.7);
            menuFrame++;
            
            menuCtx.font = "bold 18px monospace"; menuCtx.fillStyle = '#FFE484';
            menuCtx.fillText("🐦 ЛЕТИ ВПЕРЁД!", 140, 90);
        }
        
        // ЦИКЛЫ
        let animFrame;
        function gameLoop() { updateGame(); draw(); animFrame = requestAnimationFrame(gameLoop); }
        function menuLoop() { drawMenu(); requestAnimationFrame(menuLoop); }
        
        // ВЫБОР ПЕРСОНАЖА
        function renderCharGrid() {
            const grid = document.getElementById('charGrid');
            grid.innerHTML = '';
            CHARACTERS.forEach(char => {
                const card = document.createElement('div');
                card.className = `char-card ${currentCharId === char.id ? 'selected' : ''}`;
                card.innerHTML = `<div class="char-emoji">${char.emoji}</div>
                    <div class="char-name">${char.name}</div>
                    <div class="char-badge">${currentCharId === char.id ? '✅ ВЫБРАН' : '▼ ВЫБРАТЬ'}</div>`;
                card.onclick = () => { currentCharId = char.id; localStorage.setItem('flappyChar', currentCharId); renderCharGrid(); };
                grid.appendChild(card);
            });
        }
        
        // НАВИГАЦИЯ
        function showMainMenu() { mainMenu.classList.remove('hidden'); charMenu.classList.add('hidden'); gameWrapper.classList.add('hidden'); gameUI.classList.add('hidden'); if(animFrame) cancelAnimationFrame(animFrame); }
        function showCharMenu() { mainMenu.classList.add('hidden'); charMenu.classList.remove('hidden'); gameWrapper.classList.add('hidden'); gameUI.classList.add('hidden'); if(animFrame) cancelAnimationFrame(animFrame); renderCharGrid(); }
        function startGame() {
            mainMenu.classList.add('hidden'); charMenu.classList.add('hidden');
            gameWrapper.classList.remove('hidden'); gameUI.classList.remove('hidden');
            resetGame();
            if(animFrame) cancelAnimationFrame(animFrame);
            animFrame = requestAnimationFrame(gameLoop);
        }
        
        // ОБРАБОТЧИКИ
        document.getElementById('playBtn').onclick = () => startGame();
        document.getElementById('charactersBtn').onclick = () => showCharMenu();
        document.getElementById('backToMenuBtn').onclick = () => showMainMenu();
        document.getElementById('menuFromGameBtn').onclick = () => { if(animFrame) cancelAnimationFrame(animFrame); showMainMenu(); };
        document.getElementById('pauseGameBtn').onclick = () => togglePause();
        restartOverlay.onclick = () => { resetGame(); };
        canvas.addEventListener('click', (e) => { e.preventDefault(); flap(); });
        window.addEventListener('keydown', (e) => { if(e.code === 'Space') { e.preventDefault(); flap(); } });
        
        bestSpan.innerText = bestScore;
        showMainMenu();
        renderCharGrid();
        menuLoop();
    })();
</script>
</body>
</html>
