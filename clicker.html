<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flappy Bird — лети между трубами</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0b2b3b, #1a4a6f);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Segoe UI', monospace;
        }

        .game-container {
            background: #0d2b2f;
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        .info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .score-box, .best-box {
            background: #071a1c;
            padding: 6px 18px;
            border-radius: 50px;
            color: #f5e56b;
            font-weight: bold;
            font-size: 1.3rem;
            font-family: monospace;
        }

        .best-box {
            color: #a3e4a1;
        }

        button {
            background: #f5b042;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            padding: 6px 22px;
            border-radius: 60px;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.1s;
            box-shadow: 0 3px 0 #a05e15;
        }

        button:active {
            transform: scale(0.96);
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .hint {
            background: #072226;
            padding: 5px 12px;
            border-radius: 50px;
            color: #bbe0df;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="info">
            <div class="score-box">🏆 СЧЁТ: <span id="scoreValue">0</span></div>
            <div class="best-box">⭐ РЕКОРД: <span id="bestValue">0</span></div>
            <div class="controls">
                <span class="hint">🐦 ПРОБЕЛ / КЛИК — ВЗМАХ</span>
                <button id="resetGameBtn">🔄 ЗАНОВО</button>
            </div>
        </div>
    </div>
</div>

<script>
    (function(){
        // -------- НАСТРОЙКИ --------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // РАЗМЕРЫ
        const W = 400, H = 600;
        canvas.width = W;
        canvas.height = H;
        
        // ПТИЦА
        const BIRD_SIZE = 24;
        let birdX = 70;
        let birdY = H/2 - BIRD_SIZE/2;
        let birdVel = 0;
        const GRAVITY = 0.2;
        const JUMP_POWER = -4.5;
        
        // ТРУБЫ
        let pipes = [];
        const PIPE_WIDTH = 60;
        const PIPE_GAP = 130;
        const PIPE_SPACING = 220;   // расстояние между трубами
        let frameCounter = 0;
        let pipeSpawnCounter = 0;
        let baseSpeed = 2.2;
        let gameSpeed = baseSpeed;
        
        // ИГРОВЫЕ ФЛАГИ
        let gameRunning = true;
        let score = 0;
        let bestScore = localStorage.getItem('flappyBest') ? parseInt(localStorage.getItem('flappyBest')) : 0;
        
        // Элементы UI
        const scoreSpan = document.getElementById('scoreValue');
        const bestSpan = document.getElementById('bestValue');
        bestSpan.innerText = bestScore;
        
        // -------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ --------
        function updateScoreUI() {
            scoreSpan.innerText = Math.floor(score);
        }
        
        function updateBestUI() {
            bestSpan.innerText = bestScore;
        }
        
        function saveBest() {
            if(Math.floor(score) > bestScore) {
                bestScore = Math.floor(score);
                localStorage.setItem('flappyBest', bestScore);
                updateBestUI();
            }
        }
        
        // -------- СОЗДАНИЕ ТРУБЫ --------
        function addPipe() {
            let minTop = 80;
            let maxTop = H - PIPE_GAP - 80;
            let topHeight = Math.floor(Math.random() * (maxTop - minTop + 1) + minTop);
            pipes.push({
                x: W,
                topHeight: topHeight,
                bottomY: topHeight + PIPE_GAP,
                counted: false
            });
        }
        
        // -------- СБРОС ИГРЫ --------
        function resetGame() {
            gameRunning = true;
            score = 0;
            updateScoreUI();
            birdY = H/2 - BIRD_SIZE/2;
            birdVel = 0;
            pipes = [];
            frameCounter = 0;
            pipeSpawnCounter = 0;
            gameSpeed = baseSpeed;
            // сразу добавим пару труб
            addPipe();
            addPipe();
        }
        
        // -------- ПРЫЖОК (ВЗМАХ) --------
        function flap() {
            if(!gameRunning) return;
            birdVel = JUMP_POWER;
            // небольшой эффект хвоста
        }
        
        // -------- ОБНОВЛЕНИЕ ЛОГИКИ --------
        function updateGame() {
            if(!gameRunning) return;
            
            // 1. ПТИЦА
            birdVel += GRAVITY;
            birdY += birdVel;
            
            // границы (верх/низ) — смерть
            if(birdY <= 0 || birdY + BIRD_SIZE >= H) {
                gameRunning = false;
                saveBest();
                return;
            }
            
            // 2. ТРУБЫ: движение и столкновения
            for(let i=0; i<pipes.length; i++) {
                const p = pipes[i];
                p.x -= gameSpeed;
                
                // СТОЛКНОВЕНИЕ с трубой
                if(birdX + BIRD_SIZE > p.x && birdX < p.x + PIPE_WIDTH) {
                    if(birdY < p.topHeight || birdY + BIRD_SIZE > p.bottomY) {
                        gameRunning = false;
                        saveBest();
                        return;
                    }
                }
                
                // УВЕЛИЧЕНИЕ СЧЁТА (когда птица пролетела трубу)
                if(!p.counted && birdX > p.x + PIPE_WIDTH) {
                    p.counted = true;
                    score += 1;
                    updateScoreUI();
                    saveBest();
                    // увеличиваем скорость со временем
                    if(gameSpeed < 5) {
                        gameSpeed = baseSpeed + Math.floor(score / 18) * 0.2;
                        if(gameSpeed > 5) gameSpeed = 5;
                    }
                }
            }
            
            // удаляем ушедшие трубы
            pipes = pipes.filter(p => p.x + PIPE_WIDTH > 0);
            
            // 3. ГЕНЕРАЦИЯ НОВЫХ ТРУБ (каждые ~90 кадров)
            if(pipes.length === 0 || pipes[pipes.length-1].x < W - PIPE_SPACING) {
                addPipe();
            }
        }
        
        // -------- ОТРИСОВКА ВСЕГО --------
        function draw() {
            ctx.clearRect(0, 0, W, H);
            
            // 1. НЕБО (градиент)
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#2c7da0');
            grad.addColorStop(1, '#1f5068');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
            
            // 2. ОБЛАКА
            ctx.fillStyle = 'rgba(255,255,240,0.7)';
            ctx.beginPath();
            ctx.ellipse(80, 80, 35, 28, 0, 0, Math.PI*2);
            ctx.ellipse(110, 70, 30, 25, 0, 0, Math.PI*2);
            ctx.ellipse(50, 75, 28, 24, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(300, 150, 40, 32, 0, 0, Math.PI*2);
            ctx.ellipse(340, 140, 32, 28, 0, 0, Math.PI*2);
            ctx.fill();
            
            // 3. ТРУБЫ (зелёные, с тенью)
            for(let p of pipes) {
                // верхняя труба
                ctx.fillStyle = '#2f6b47';
                ctx.fillRect(p.x, 0, PIPE_WIDTH, p.topHeight);
                ctx.fillStyle = '#1f4a2f';
                ctx.fillRect(p.x-5, p.topHeight-35, PIPE_WIDTH+10, 35);
                ctx.fillStyle = '#8fbf5e';
                ctx.fillRect(p.x-3, p.topHeight-30, PIPE_WIDTH+6, 25);
                
                // нижняя труба
                ctx.fillStyle = '#2f6b47';
                ctx.fillRect(p.x, p.bottomY, PIPE_WIDTH, H - p.bottomY);
                ctx.fillStyle = '#1f4a2f';
                ctx.fillRect(p.x-5, p.bottomY, PIPE_WIDTH+10, 35);
                ctx.fillStyle = '#8fbf5e';
                ctx.fillRect(p.x-3, p.bottomY+5, PIPE_WIDTH+6, 25);
            }
            
            // 4. ПТИЦА (жёлтая с глазом)
            ctx.fillStyle = '#f7d44a';
            ctx.beginPath();
            ctx.ellipse(birdX + BIRD_SIZE/2, birdY + BIRD_SIZE/2, BIRD_SIZE/1.8, BIRD_SIZE/1.6, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#e09d2c';
            ctx.beginPath();
            ctx.ellipse(birdX + BIRD_SIZE-6, birdY + 8, 5, 4, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.fillRect(birdX + BIRD_SIZE-4, birdY + 7, 3, 4);
            ctx.fillStyle = '#ff6b4a';
            ctx.beginPath();
            ctx.moveTo(birdX + 4, birdY + 12);
            ctx.lineTo(birdX - 6, birdY + 10);
            ctx.lineTo(birdX + 2, birdY + 16);
            ctx.fill();
            
            // 5. СЧЁТ НА ЭКРАНЕ (крупно)
            ctx.font = "bold 36px monospace";
            ctx.fillStyle = "#f9eeb0";
            ctx.shadowBlur = 4;
            ctx.shadowColor = "black";
            ctx.fillText(Math.floor(score), W/2-15, 70);
            ctx.shadowBlur = 0;
            
            // 6. GAME OVER
            if(!gameRunning) {
                ctx.font = "bold 28px monospace";
                ctx.fillStyle = "#d9372c";
                ctx.fillText("GAME OVER", W/2-95, H/2-50);
                ctx.font = "16px monospace";
                ctx.fillStyle = "#eeeeee";
                ctx.fillText("нажми «ЗАНОВО»", W/2-65, H/2+20);
            }
            
            // подсказка скорости
            ctx.font = "12px monospace";
            ctx.fillStyle = "#e4ffd1";
            ctx.fillText("speed: "+gameSpeed.toFixed(1), W-65, 25);
        }
        
        // -------- ИГРОВОЙ ЦИКЛ --------
        function gameLoop() {
            updateGame();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // -------- УПРАВЛЕНИЕ --------
        canvas.addEventListener('click', (e) => {
            e.preventDefault();
            flap();
        });
        
        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space') {
                e.preventDefault();
                flap();
            }
        });
        
        document.getElementById('resetGameBtn').addEventListener('click', () => {
            resetGame();
        });
        
        // блокируем скролл пробелом
        window.addEventListener('keydown', function(e) {
            if(e.code === 'Space') e.preventDefault();
        });
        
        // -------- СТАРТ --------
        resetGame();
        gameLoop();
    })();
</script>
</body>
</html>
