<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flappy Premium — выбор персонажа</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0e1a 0%, #14182b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, sans-serif;
            padding: 20px;
        }

        .premium-container {
            background: rgba(18, 22, 45, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 24px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 32px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            background: #0b1120;
        }

        .menu {
            text-align: center;
            color: white;
            min-width: 320px;
        }

        .menu h1 {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 35px;
            background: linear-gradient(135deg, #FFE6B0, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 18px;
            align-items: center;
            margin: 25px 0;
        }

        .menu-btn {
            background: linear-gradient(95deg, #FFB347, #FF8C1A);
            border: none;
            padding: 14px 45px;
            width: 260px;
            border-radius: 50px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #1e1a0c;
            cursor: pointer;
            transition: 0.07s linear;
            text-align: center;
            box-shadow: 0 6px 0 #8B4500;
        }
        .menu-btn:active { transform: translateY(2px); box-shadow: 0 3px 0 #8B4500; }

        .characters-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            margin: 30px 0;
        }
        .char-card {
            background: linear-gradient(145deg, #232842, #1a1e32);
            border-radius: 40px;
            padding: 16px 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.07s linear;
            border: 2px solid rgba(255, 200, 100, 0.6);
            box-shadow: 0 8px 0 #0b0f1a;
        }
        .char-card:active { transform: translateY(2px); box-shadow: 0 4px 0 #0b0f1a; }
        .char-card.selected {
            border: 3px solid #FFD966;
            background: linear-gradient(145deg, #2f365a, #222845);
            box-shadow: 0 0 15px rgba(255, 200, 80, 0.6);
        }
        .char-emoji { font-size: 58px; display: block; margin-bottom: 8px; }
        .char-name { font-size: 1.1rem; font-weight: bold; color: #FFE5B4; margin-bottom: 6px; }
        .char-badge { font-size: 0.8rem; color: #A5D6FF; background: #0f1322; display: inline-block; padding: 3px 12px; border-radius: 40px; margin-top: 5px; }

        .back-btn {
            background: #3a405e;
            box-shadow: 0 5px 0 #1e2238;
            width: 200px;
            margin-top: 15px;
            color: #f0f0f0;
        }

        .game-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            gap: 16px;
            background: #0c1022cc;
            backdrop-filter: blur(16px);
            border-radius: 80px;
            padding: 10px 24px;
            border: 1px solid rgba(255,215,0,0.4);
        }
        .score-box, .best-box {
            background: #010118cc;
            padding: 8px 24px;
            border-radius: 60px;
            color: #FFE484;
            font-weight: bold;
            font-size: 1.3rem;
            border: 1px solid #ffc107;
            font-family: monospace;
        }
        .best-box { color: #AAFFAA; border-color: #8aff80; }
        .game-btn {
            background: #FFA347;
            border: none;
            padding: 7px 24px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #a05100;
        }
        .game-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #a05100; }
        .hint {
            background: #000000aa;
            padding: 6px 16px;
            border-radius: 50px;
            color: #ddd;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
<div id="app" class="premium-container">
    <div id="mainMenu" class="menu">
        <h1>✨ FLAPPY PREMIUM ✨</h1>
        <div class="menu-buttons">
            <div class="menu-btn" id="playBtn">🎮 ИГРАТЬ</div>
            <div class="menu-btn" id="charactersBtn">👥 ПЕРСОНАЖИ</div>
        </div>
    </div>

    <div id="charMenu" class="menu hidden">
        <h1>🌟 ВЫБЕРИ ГЕРОЯ</h1>
        <div class="characters-grid" id="charGrid"></div>
        <div class="menu-btn back-btn" id="backToMenuBtn">◀ НАЗАД</div>
    </div>

    <canvas id="gameCanvas" width="400" height="600" class="hidden"></canvas>
    <div id="gameUI" class="game-panel hidden">
        <div class="score-box">🏆 <span id="scoreValue">0</span></div>
        <div class="best-box">⭐ <span id="bestValue">0</span></div>
        <span class="hint">🖱️ ПРОБЕЛ / КЛИК — ВЗМАХ</span>
        <button id="resetGameBtn" class="game-btn">🔄 ЗАНОВО</button>
        <button id="menuFromGameBtn" class="game-btn">🏠 МЕНЮ</button>
    </div>
</div>

<script>
    (function(){
        // ---------- ПЕРСОНАЖИ (увеличенные) ----------
        const CHARACTERS = [
            { id: 'bird', name: 'ПТИЦА', emoji: '🐦', color: '#FFD966', draw: drawBird },
            { id: 'sponge', name: 'СПАНЧ БОБ', emoji: '🍍', color: '#F4C542', draw: drawSponge },
            { id: 'kolobok', name: 'КОЛОБОК', emoji: '🍞', color: '#E8B86B', draw: drawKolobok },
            { id: 'cat', name: 'КОТ', emoji: '🐱', color: '#F5AC78', draw: drawCat },
            { id: 'robot', name: 'РОБОТ', emoji: '🤖', color: '#7FC5FF', draw: drawRobot }
        ];
        let currentCharId = localStorage.getItem('flappyChar') || 'bird';
        
        // DOM
        const mainMenu = document.getElementById('mainMenu');
        const charMenu = document.getElementById('charMenu');
        const canvas = document.getElementById('gameCanvas');
        const gameUI = document.getElementById('gameUI');
        const ctx = canvas.getContext('2d');
        const W = 400, H = 600;
        canvas.width = W; canvas.height = H;
        
        // ИГРОВЫЕ ПАРАМЕТРЫ (улучшенная физика)
        let gameRunning = true;
        let score = 0;
        let bestScore = localStorage.getItem('flappyPremiumBest') ? parseInt(localStorage.getItem('flappyPremiumBest')) : 0;
        let birdY = H/2 - 20;  // центрирование для большого персонажа
        let birdVel = 0;
        const GRAVITY = 0.35;
        const JUMP_POWER = -6.2;   // мощный прыжок
        let pipes = [];
        const PIPE_WIDTH = 56, PIPE_GAP = 158, PIPE_SPACING = 210;
        let gameSpeed = 2.5;
        const BASE_SPEED = 2.5;
        
        // Размер персонажа (увеличен)
        const CHAR_SIZE = 34;
        const CHAR_WIDTH = 32;
        const CHAR_HEIGHT = 32;
        const birdX = 70;
        
        // UI
        const scoreSpan = document.getElementById('scoreValue');
        const bestSpan = document.getElementById('bestValue');
        bestSpan.innerText = bestScore;
        function updateScoreUI() { scoreSpan.innerText = Math.floor(score); }
        function updateBestUI() { bestSpan.innerText = bestScore; }
        function saveBest() { let s = Math.floor(score); if(s > bestScore) { bestScore = s; localStorage.setItem('flappyPremiumBest', bestScore); updateBestUI(); } }
        
        // Трубы
        function addPipe() {
            let minTop = 50, maxTop = H - PIPE_GAP - 60;
            if(maxTop <= minTop) maxTop = minTop + 50;
            let topHeight = Math.floor(Math.random() * (maxTop - minTop + 1) + minTop);
            pipes.push({ x: W, topHeight: topHeight, bottomY: topHeight + PIPE_GAP, counted: false });
        }
        
        function resetGame() {
            gameRunning = true;
            score = 0; updateScoreUI();
            birdY = H/2 - 18; birdVel = 0;
            pipes = []; gameSpeed = BASE_SPEED;
            addPipe(); addPipe();
            if(pipes[0]) pipes[0].x = W;
            if(pipes[1]) pipes[1].x = W + PIPE_SPACING;
        }
        
        function flap() { if(gameRunning) birdVel = JUMP_POWER; }
        
        // ЛОГИКА
        function updateGame() {
            if(!gameRunning) return;
            birdVel += GRAVITY;
            birdY += birdVel;
            
            // границы
            if(birdY <= 0 || birdY + CHAR_HEIGHT >= H) {
                gameRunning = false; saveBest(); return;
            }
            
            for(let i=0;i<pipes.length;i++) {
                const p = pipes[i];
                p.x -= gameSpeed;
                // столкновение
                if(birdX + CHAR_WIDTH > p.x && birdX < p.x + PIPE_WIDTH &&
                   (birdY < p.topHeight || birdY + CHAR_HEIGHT > p.bottomY)) {
                    gameRunning = false; saveBest(); return;
                }
                // очки
                if(!p.counted && birdX > p.x + PIPE_WIDTH) {
                    p.counted = true;
                    score += 1; updateScoreUI(); saveBest();
                    if(gameSpeed < 5.5) gameSpeed = BASE_SPEED + Math.floor(score/22) * 0.18;
                    if(gameSpeed > 5.5) gameSpeed = 5.5;
                }
            }
            pipes = pipes.filter(p => p.x + PIPE_WIDTH > 0);
            if(pipes.length === 0 || pipes[pipes.length-1].x < W - PIPE_SPACING) addPipe();
        }
        
        // ----- ОТРИСОВКА ПЕРСОНАЖЕЙ (увеличенные, детальные) -----
        function drawBird(x,y) {
            ctx.fillStyle = '#FFD966'; ctx.beginPath(); ctx.ellipse(x+16, y+16, 16, 14, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#E69500'; ctx.beginPath(); ctx.ellipse(x+24, y+10, 7, 6, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#000'; ctx.fillRect(x+25, y+9, 4, 5); ctx.fillStyle = 'white'; ctx.fillRect(x+26, y+8, 2, 2);
            ctx.fillStyle = '#E65C1E'; ctx.beginPath(); ctx.moveTo(x+10, y+20); ctx.lineTo(x-6, y+15); ctx.lineTo(x+8, y+28); ctx.fill();
        }
        
        function drawSponge(x,y) {
            ctx.fillStyle = '#F7D44A'; ctx.fillRect(x+4, y+4, 28, 28);
            ctx.fillStyle = '#B9770E'; for(let i=0;i<4;i++){ ctx.fillRect(x+8+i*6, y+8, 3, 6); ctx.fillRect(x+8+i*6, y+20, 3, 6);}
            ctx.fillStyle = '#000'; ctx.fillRect(x+10, y+14, 4, 5); ctx.fillRect(x+20, y+14, 4, 5);
            ctx.fillStyle = '#FFF'; ctx.fillRect(x+10, y+13, 2, 2); ctx.fillRect(x+20, y+13, 2, 2);
            ctx.fillStyle = '#6B4C2C'; ctx.fillRect(x+14, y+25, 6, 4);
        }
        
        function drawKolobok(x,y) {
            ctx.fillStyle = '#E8B86B'; ctx.beginPath(); ctx.arc(x+16, y+16, 16, 0, 2*Math.PI); ctx.fill();
            ctx.fillStyle = '#8B5A2B'; ctx.fillRect(x+8, y+11, 4, 5); ctx.fillRect(x+22, y+11, 4, 5);
            ctx.fillStyle = '#FFF'; ctx.fillRect(x+8, y+10, 2, 2); ctx.fillRect(x+22, y+10, 2, 2);
            ctx.fillStyle = '#D2691E'; ctx.beginPath(); ctx.arc(x+16, y+25, 6, 0, Math.PI); ctx.fill();
        }
        
        function drawCat(x,y) {
            ctx.fillStyle = '#F5AC78'; ctx.fillRect(x+5, y+5, 24, 26);
            ctx.fillStyle = '#E08E4A'; ctx.beginPath(); ctx.moveTo(x+5, y+5); ctx.lineTo(x, y); ctx.lineTo(x+12, y+5); ctx.fill();
            ctx.beginPath(); ctx.moveTo(x+29, y+5); ctx.lineTo(x+34, y); ctx.lineTo(x+22, y+5); ctx.fill();
            ctx.fillStyle = '#000'; ctx.fillRect(x+11, y+13, 4, 5); ctx.fillRect(x+20, y+13, 4, 5);
            ctx.fillStyle = '#FFF'; ctx.fillRect(x+11, y+12, 2, 2); ctx.fillRect(x+20, y+12, 2, 2);
            for(let i=0;i<3;i++) ctx.fillRect(x+6+i*8, y+27, 2, 4);
        }
        
        function drawRobot(x,y) {
            ctx.fillStyle = '#7FC5FF'; ctx.fillRect(x+4, y+3, 26, 28);
            ctx.fillStyle = '#4C7AB3'; ctx.fillRect(x+10, y-4, 14, 8);
            ctx.fillStyle = '#000'; ctx.fillRect(x+11, y+12, 4, 5); ctx.fillRect(x+20, y+12, 4, 5);
            ctx.fillStyle = '#0FF'; ctx.fillRect(x+13, y+22, 8, 4);
            for(let i=0;i<2;i++) ctx.fillRect(x+7+i*18, y+28, 3, 4);
        }
        
        // ОТРИСОВКА МИРА
        function draw() {
            ctx.clearRect(0, 0, W, H);
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#0F172A'); grad.addColorStop(1, '#1E293B');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
            
            // трубы
            for(let p of pipes) {
                ctx.fillStyle = '#2F6B47CC'; ctx.fillRect(p.x, 0, PIPE_WIDTH, p.topHeight);
                ctx.fillStyle = '#A8E6A0CC'; ctx.fillRect(p.x+5, p.topHeight-38, PIPE_WIDTH-10, 38);
                ctx.fillStyle = '#2F6B47CC'; ctx.fillRect(p.x, p.bottomY, PIPE_WIDTH, H-p.bottomY);
                ctx.fillStyle = '#A8E6A0CC'; ctx.fillRect(p.x+5, p.bottomY, PIPE_WIDTH-10, 38);
            }
            
            // персонаж
            const char = CHARACTERS.find(c => c.id === currentCharId);
            if(char && char.draw) char.draw(birdX, birdY);
            else drawBird(birdX, birdY);
            
            // счёт
            ctx.font = "bold 46px 'Segoe UI'"; ctx.fillStyle = '#FFF7E8'; ctx.shadowBlur = 0;
            ctx.fillText(Math.floor(score), W/2-22, 75);
            
            if(!gameRunning){
                ctx.font = "bold 26px 'Segoe UI'"; ctx.fillStyle = '#FFA08C'; ctx.fillText("✦ GAME OVER ✦", W/2-105, H/2-45);
                ctx.font = "14px monospace"; ctx.fillStyle = '#DDD'; ctx.fillText("нажми «ЗАНОВО»", W/2-62, H/2+20);
            }
            ctx.font = "bold 12px monospace"; ctx.fillStyle = '#B0E0E6'; ctx.fillText("speed: "+gameSpeed.toFixed(1), W-72, 28);
        }
        
        // ЦИКЛ 120fps
        let animFrame;
        function gameLoop() { updateGame(); draw(); animFrame = requestAnimationFrame(gameLoop); }
        
        // ВЫБОР ПЕРСОНАЖА
        function renderCharGrid() {
            const grid = document.getElementById('charGrid');
            grid.innerHTML = '';
            CHARACTERS.forEach(char => {
                const card = document.createElement('div');
                card.className = `char-card ${currentCharId === char.id ? 'selected' : ''}`;
                card.innerHTML = `
                    <span class="char-emoji">${char.emoji}</span>
                    <div class="char-name">${char.name}</div>
                    <div class="char-badge">${currentCharId === char.id ? '✅ ВЫБРАН' : '▼ ВЫБРАТЬ'}</div>
                `;
                card.onclick = () => {
                    currentCharId = char.id;
                    localStorage.setItem('flappyChar', currentCharId);
                    renderCharGrid(); 
                };
                grid.appendChild(card);
            });
        }
        
        // НАВИГАЦИЯ
        function showMainMenu() { mainMenu.classList.remove('hidden'); charMenu.classList.add('hidden'); canvas.classList.add('hidden'); gameUI.classList.add('hidden'); if(animFrame) cancelAnimationFrame(animFrame); }
        function showCharMenu() { mainMenu.classList.add('hidden'); charMenu.classList.remove('hidden'); canvas.classList.add('hidden'); gameUI.classList.add('hidden'); if(animFrame) cancelAnimationFrame(animFrame); renderCharGrid(); }
        function startGame() {
            mainMenu.classList.add('hidden'); charMenu.classList.add('hidden');
            canvas.classList.remove('hidden'); gameUI.classList.remove('hidden');
            resetGame(); gameRunning = true;
            if(animFrame) cancelAnimationFrame(animFrame);
            animFrame = requestAnimationFrame(function loop(){ updateGame(); draw(); animFrame = requestAnimationFrame(loop); });
        }
        
        // ОБРАБОТЧИКИ
        document.getElementById('playBtn').onclick = () => startGame();
        document.getElementById('charactersBtn').onclick = () => showCharMenu();
        document.getElementById('backToMenuBtn').onclick = () => showMainMenu();
        document.getElementById('menuFromGameBtn').onclick = () => { if(animFrame) cancelAnimationFrame(animFrame); showMainMenu(); };
        document.getElementById('resetGameBtn').onclick = () => { resetGame(); gameRunning = true; };
        canvas.addEventListener('click', (e) => { e.preventDefault(); flap(); });
        window.addEventListener('keydown', (e) => { if(e.code === 'Space') { e.preventDefault(); flap(); } });
        
        // СТАРТ
        bestSpan.innerText = bestScore;
        showMainMenu();
        renderCharGrid();
    })();
</script>
</body>
</html>
