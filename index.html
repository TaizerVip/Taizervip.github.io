<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🧮 Математический тренажёр — с объяснениями</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, sans-serif;
            transition: background 0.3s ease;
        }

        body.theme-forest { background: linear-gradient(135deg, #1a472a, #2d6a4f); }
        body.theme-ocean { background: linear-gradient(135deg, #0a2a4a, #1a5a7a); }
        body.theme-space { background: linear-gradient(135deg, #0a0a2a, #2a0a4a); }
        body.theme-desert { background: linear-gradient(135deg, #d4a04a, #f0c060); }
        body.theme-city { background: linear-gradient(135deg, #2a2a3a, #3a3a5a); }

        .container {
            max-width: 550px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Питомец */
        .pet-area { text-align: center; }
        .pet-emoji { font-size: 80px; display: inline-block; transition: transform 0.2s; }
        .pet-animation-happy { animation: shake 0.5s ease-in-out; }
        .pet-animation-sad { animation: wobble 0.5s ease-in-out; }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        @keyframes wobble {
            0%,100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }
        
        .pet-name { font-size: 1.3rem; font-weight: bold; color: white; margin: 5px 0; }
        .pet-level { font-size: 0.9rem; color: #ffd966; }
        .progress-bar { width: 100%; height: 12px; background: rgba(255,255,255,0.2); border-radius: 20px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #2ecc71, #27ae60); border-radius: 20px; transition: width 0.3s ease; }

        /* Кнопки */
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: transform 0.05s linear;
            margin-bottom: 12px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: #ff9f43; color: #1e1a0c; box-shadow: 0 4px 0 #b86f1a; }
        .btn-secondary { background: #45475a; color: white; box-shadow: 0 4px 0 #2a2c3a; }
        .btn-shop { background: #9b59b6; color: white; box-shadow: 0 4px 0 #6c3483; }
        .btn-danger { background: #e74c3c; color: white; box-shadow: 0 4px 0 #a93226; }
        .btn-settings { background: #3498db; color: white; box-shadow: 0 4px 0 #1f618d; }

        /* Объяснение ошибки */
        .explanation-box {
            background: rgba(0,0,0,0.5);
            border-radius: 24px;
            padding: 15px;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
        }
        .column-math {
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            line-height: 1.6;
            white-space: pre;
            text-align: center;
        }
        .step-text {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-size: 0.9rem;
        }

        /* Магазин */
        .shop-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 15px; }
        .shop-item { background: rgba(0,0,0,0.4); border-radius: 24px; padding: 12px; text-align: center; cursor: pointer; transition: 0.1s; border: 1px solid rgba(255,255,255,0.1); }
        .shop-item:active { transform: scale(0.96); }
        .shop-item-emoji { font-size: 48px; }
        .shop-item-name { font-size: 0.8rem; color: white; margin: 5px 0; }
        .shop-item-price { font-size: 0.7rem; color: #f9e2af; }
        .shop-item-owned { color: #2ecc71; font-size: 0.7rem; }
        .shop-item-equipped { color: #ff9f43; font-size: 0.7rem; }

        /* Игровая область */
        .question { font-size: 48px; font-weight: bold; text-align: center; color: white; margin: 30px 0; }
        .answer-input { width: 100%; padding: 16px; font-size: 28px; text-align: center; background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.3); border-radius: 60px; color: white; font-weight: bold; }
        .answer-input:focus { outline: none; border-color: #ff9f43; }
        .status { text-align: center; margin-top: 15px; font-size: 1rem; }
        .correct { color: #2ecc71; }
        .wrong { color: #e74c3c; }

        .stats-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .score-display { font-size: 1.2rem; font-weight: bold; color: #f9e2af; }

        .settings-option { margin: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .settings-label { color: white; font-size: 1rem; }
        .toggle-switch { width: 50px; height: 26px; background: #45475a; border-radius: 30px; cursor: pointer; position: relative; transition: 0.2s; }
        .toggle-switch.active { background: #2ecc71; }
        .toggle-switch::after { content: ''; position: absolute; width: 22px; height: 22px; background: white; border-radius: 50%; top: 2px; left: 3px; transition: 0.2s; }
        .toggle-switch.active::after { left: 25px; }
        .quality-buttons { display: flex; gap: 10px; }
        .quality-btn { flex: 1; padding: 8px; border-radius: 30px; background: #45475a; color: white; text-align: center; cursor: pointer; }
        .quality-btn.active { background: #ff9f43; color: #1e1a0c; }

        .hidden { display: none; }
    </style>
</head>
<body class="theme-forest">
<div class="container" id="app">
    <!-- МЕНЮ -->
    <div id="menuScreen">
        <div class="glass-card pet-area">
            <div class="pet-emoji" id="petEmoji">🐦</div>
            <div class="pet-name" id="petName">Пушистик</div>
            <div class="pet-level" id="petLevel">Уровень 1</div>
            <div class="progress-bar"><div class="progress-fill" id="petProgress" style="width: 0%"></div></div>
            <div class="score-display" id="menuScore">⭐ 0 баллов</div>
        </div>
        <div class="glass-card">
            <button class="btn btn-primary" id="playBtn">🚀 НАЧАТЬ</button>
            <button class="btn btn-shop" id="shopBtn">🛒 МАГАЗИН</button>
            <button class="btn btn-secondary" id="profileBtn">👤 ПРОФИЛЬ</button>
            <button class="btn btn-settings" id="settingsBtn">⚙ НАСТРОЙКИ</button>
        </div>
    </div>

    <!-- ВЫБОР УРОВНЯ -->
    <div id="difficultyScreen" class="hidden">
        <div class="glass-card">
            <button class="btn btn-secondary" id="backToMenuBtn">◀ НАЗАД</button>
            <h2 style="color:white; text-align:center; margin:20px 0">Выбери уровень</h2>
            <button class="btn btn-primary" id="easyBtn">🟢 ЛЁГКИЙ (ответ ≤ 50)</button>
            <button class="btn btn-primary" id="mediumBtn">🟠 СРЕДНИЙ (ответ ≤ 100)</button>
            <button class="btn btn-primary" id="hardBtn">🔴 ТАБЛИЦА УМНОЖЕНИЯ (0.5 балла)</button>
        </div>
    </div>

    <!-- ИГРА -->
    <div id="gameScreen" class="hidden">
        <div class="glass-card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <button class="btn btn-secondary" style="width: auto; padding: 8px 16px; margin:0" id="gameMenuBtn">◀ МЕНЮ</button>
                <div id="gamePet" style="color:white; font-size:1.2rem">🐦 Lv.1</div>
                <div class="score-display" id="gameScore">⭐ 0</div>
            </div>
            <div class="question" id="question">0 + 0</div>
            <input type="number" id="answerInput" class="answer-input" placeholder="?" autofocus>
            <button class="btn btn-primary" id="checkBtn" style="margin-top: 15px;">✅ ПРОВЕРИТЬ</button>
            <div class="status" id="status"></div>
            <div id="explanationBox" class="explanation-box hidden"></div>
        </div>
    </div>

    <!-- МАГАЗИН, ПРОФИЛЬ, НАСТРОЙКИ (как в предыдущей версии) -->
    <div id="shopScreen" class="hidden"><div class="glass-card"><button class="btn btn-secondary" id="shopBackBtn">◀ НАЗАД</button><div class="score-display" style="text-align:center" id="shopScore">⭐ 0</div><div style="display:flex;gap:10px;margin:15px 0"><button class="btn btn-primary" style="flex:1" id="skinsTabBtn">🎭 ПЕРСОНАЖИ</button><button class="btn btn-primary" style="flex:1" id="bgTabBtn">🌍 ФОНЫ</button></div><div id="skinsGrid" class="shop-grid"></div><div id="bgGrid" class="shop-grid hidden"></div></div></div>
    <div id="profileScreen" class="hidden"><div class="glass-card"><button class="btn btn-secondary" id="profileBackBtn">◀ НАЗАД</button><div class="pet-area"><div class="pet-emoji" id="profilePetEmoji">🐦</div><div class="pet-name" id="profilePetName">Пушистик</div><div class="pet-level" id="profilePetLevel">Уровень 1</div><div class="progress-bar"><div class="progress-fill" id="profilePetProgress" style="width:0%"></div></div></div><div class="stats-row"><span>⭐ Всего баллов:</span><span id="profileScore">0</span></div><div class="stats-row"><span>✅ Правильных ответов:</span><span id="profileCorrect">0</span></div><div class="stats-row"><span>📊 Всего попыток:</span><span id="profileAttempts">0</span></div><div class="stats-row"><span>📈 Процент успеха:</span><span id="profileAccuracy">0%</span></div><button class="btn btn-secondary" id="renamePetBtn">🏷️ СМЕНИТЬ ИМЯ</button><button class="btn btn-danger" id="resetStatsBtn">🔄 СБРОСИТЬ СТАТИСТИКУ</button></div></div>
    <div id="settingsScreen" class="hidden"><div class="glass-card"><button class="btn btn-secondary" id="settingsBackBtn">◀ НАЗАД</button><h2 style="color:white;text-align:center">⚙ НАСТРОЙКИ</h2><div class="settings-option"><span class="settings-label">🎵 Музыка</span><div class="toggle-switch" id="musicToggle"></div></div><div class="settings-option"><span class="settings-label">🔊 Звуки</span><div class="toggle-switch" id="sfxToggle"></div></div><div class="settings-option"><span class="settings-label">🖼️ Качество</span></div><div class="quality-buttons"><div class="quality-btn" data-quality="low">🟢 Низкое</div><div class="quality-btn" data-quality="medium">🟡 Среднее</div><div class="quality-btn" data-quality="high">🔴 Высокое</div></div><button class="btn btn-danger" id="resetBalanceBtn">💰 ОБНУЛИТЬ БАЛЛЫ</button></div></div>

    <div id="renameDialog" style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:1000"><div class="glass-card" style="width:300px"><h3 style="color:white;text-align:center">Имя питомца</h3><input type="text" id="newPetName" style="width:100%; padding:12px; margin:15px 0; border-radius:30px; border:none; background:#313244; color:white; text-align:center"><button class="btn btn-primary" id="saveNameBtn">СОХРАНИТЬ</button><button class="btn btn-secondary" id="cancelNameBtn">ОТМЕНА</button></div></div>
</div>

<script>
    // ==================== ЗВУКИ ====================
    let musicEnabled = true, sfxEnabled = true, currentMusic = null;
    function playCorrectSound() { if(sfxEnabled) try { let ctx=new (AudioContext||webkitAudioContext)(), o=ctx.createOscillator(), g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value=880; g.gain.value=0.2; o.start(); g.gain.exponentialRampToValueAtTime(0.00001,ctx.currentTime+0.5); o.stop(ctx.currentTime+0.5); } catch(e){} }
    function playWrongSound() { if(sfxEnabled) try { let ctx=new (AudioContext||webkitAudioContext)(), o=ctx.createOscillator(), g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value=440; g.gain.value=0.15; o.start(); g.gain.exponentialRampToValueAtTime(0.00001,ctx.currentTime+0.3); o.stop(ctx.currentTime+0.3); } catch(e){} }
    function playLevelUpSound() { if(sfxEnabled) try { let ctx=new (AudioContext||webkitAudioContext)(); for(let i=0;i<3;i++){ let o=ctx.createOscillator(), g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value=660+i*110; g.gain.value=0.1; o.start(ctx.currentTime+i*0.1); g.gain.exponentialRampToValueAtTime(0.00001,ctx.currentTime+i*0.1+0.3); o.stop(ctx.currentTime+i*0.1+0.3); } } catch(e){} }

    // ==================== ДАННЫЕ ====================
    let gameData = { score:0, correctAnswers:0, totalAttempts:0, petLevel:1, petExp:0, petName:"Пушистик", currentSkin:"🐦 Птица", currentBg:"forest" };
    const skins = { "🐦 Птица":{emoji:"🐦",price:0,owned:true}, "🐱 Кот":{emoji:"🐱",price:50,owned:false}, "🐶 Собака":{emoji:"🐶",price:50,owned:false}, "🦊 Лиса":{emoji:"🦊",price:100,owned:false}, "🐼 Панда":{emoji:"🐼",price:150,owned:false}, "🐸 Лягушка":{emoji:"🐸",price:80,owned:false}, "🐧 Пингвин":{emoji:"🐧",price:120,owned:false}, "🦄 Единорог":{emoji:"🦄",price:200,owned:false} };
    const backgrounds = { forest:{name:"🌲 Лес",price:0,owned:true}, ocean:{name:"🌊 Океан",price:30,owned:false}, space:{name:"🚀 Космос",price:50,owned:false}, desert:{name:"🏜️ Пустыня",price:40,owned:false}, city:{name:"🌃 Город",price:60,owned:false} };

    function loadData() { let saved=localStorage.getItem("mathTrainerData"); if(saved){ try{ let d=JSON.parse(saved); gameData={...gameData,...d}; if(d.ownedSkins) for(let s in skins) if(d.ownedSkins[s]) skins[s].owned=true; if(d.ownedBgs) for(let b in backgrounds) if(d.ownedBgs[b]) backgrounds[b].owned=true; if(d.musicEnabled!==undefined) musicEnabled=d.musicEnabled; if(d.sfxEnabled!==undefined) sfxEnabled=d.sfxEnabled; if(d.quality) document.body.className=document.body.className.replace(/quality-\w+/,'quality-'+d.quality); }catch(e){} } updateToggleUI(); }
    function saveData() { let toSave={...gameData, ownedSkins:{}, ownedBgs:{}, musicEnabled, sfxEnabled, quality:document.body.className.match(/quality-(\w+)/)?.[1]||"high"}; for(let s in skins) if(skins[s].owned && skins[s].price>0) toSave.ownedSkins[s]=true; for(let b in backgrounds) if(backgrounds[b].owned && backgrounds[b].price>0) toSave.ownedBgs[b]=true; localStorage.setItem("mathTrainerData",JSON.stringify(toSave)); }
    function updateToggleUI() { let mt=document.getElementById("musicToggle"), st=document.getElementById("sfxToggle"); if(mt) mt.className=`toggle-switch ${musicEnabled?'active':''}`; if(st) st.className=`toggle-switch ${sfxEnabled?'active':''}`; }
    function animatePet(anim) { let pe=document.querySelector(".pet-emoji"); if(!pe) return; pe.classList.remove("pet-animation-happy","pet-animation-sad"); void pe.offsetWidth; pe.classList.add(`pet-animation-${anim}`); setTimeout(()=>pe.classList.remove(`pet-animation-${anim}`),500); }
    function applyTheme() { document.body.className=document.body.className.replace(/theme-\w+/,`theme-${gameData.currentBg}`); }
    function addPetExp(amount) { let oldLvl=gameData.petLevel; gameData.petExp+=amount; let need=gameData.petLevel*10; while(gameData.petExp>=need){ gameData.petExp-=need; gameData.petLevel++; need=gameData.petLevel*10; playLevelUpSound(); alert(`🎉 ${gameData.petName} достиг ${gameData.petLevel} уровня!`); } if(gameData.petLevel>oldLvl) animatePet("happy"); updatePetUI(); saveData(); }
    function updatePetUI() { let need=gameData.petLevel*10, per=(gameData.petExp/need)*100, emoji=skins[gameData.currentSkin]?.emoji||"🐦"; document.querySelectorAll(".pet-emoji").forEach(el=>el.innerText=emoji); document.querySelectorAll(".pet-name").forEach(el=>el.innerText=gameData.petName); document.querySelectorAll(".pet-level").forEach(el=>el.innerHTML=`Уровень ${gameData.petLevel} • ${gameData.petExp}/${need} опыта`); document.querySelectorAll(".progress-fill").forEach(el=>el.style.width=`${per}%`); document.getElementById("menuScore").innerHTML=`⭐ ${gameData.score} баллов`; if(document.getElementById("gameScore")) document.getElementById("gameScore").innerHTML=`⭐ ${gameData.score}`; if(document.getElementById("shopScore")) document.getElementById("shopScore").innerHTML=`⭐ ${gameData.score} баллов`; if(document.getElementById("profileScore")){ document.getElementById("profileScore").innerText=gameData.score; document.getElementById("profileCorrect").innerText=gameData.correctAnswers; document.getElementById("profileAttempts").innerText=gameData.totalAttempts; let acc=gameData.totalAttempts>0?((gameData.correctAnswers/gameData.totalAttempts)*100).toFixed(1):0; document.getElementById("profileAccuracy").innerText=`${acc}%`; } }

    // ==================== ГЕНЕРАЦИЯ ПРИМЕРОВ ====================
    let currentDifficulty = "easy";
    
    function generateQuestion() {
        if (currentDifficulty === "hard") {
            // Таблица умножения: числа от 2 до 9
            let a = Math.floor(Math.random() * 8) + 2;
            let b = Math.floor(Math.random() * 9) + 1;
            return { text: `${a} × ${b}`, answer: a * b, type: "mult" };
        }
        
        let maxAnswer = currentDifficulty === "easy" ? 50 : 100;
        let maxAttempts = 0;
        let a, b, answer, text;
        
        while (maxAttempts < 30) {
            if (Math.random() < 0.5) {
                // Сложение
                a = Math.floor(Math.random() * (maxAnswer)) + 1;
                b = Math.floor(Math.random() * (maxAnswer - a)) + 1;
                answer = a + b;
                if (answer <= maxAnswer && answer >= 0) {
                    text = `${a} + ${b}`;
                    break;
                }
            } else {
                // Вычитание
                a = Math.floor(Math.random() * maxAnswer) + 1;
                b = Math.floor(Math.random() * a) + 1;
                answer = a - b;
                if (answer >= 0 && answer <= maxAnswer) {
                    text = `${a} - ${b}`;
                    break;
                }
            }
            maxAttempts++;
        }
        return { text, answer, type: "addsub" };
    }

    // ==================== ОБЪЯСНЕНИЕ В СТОЛБИК ====================
    function getColumnExplanation(questionText, correctAnswer, userAnswer) {
        if (currentDifficulty === "hard") {
            let parts = questionText.split(' × ');
            let a = parseInt(parts[0]);
            let b = parseInt(parts[1]);
            return `
                <div style="font-family:'Courier New',monospace; text-align:center; font-size:1.1rem;">
                    <pre style="background:rgba(0,0,0,0.3); padding:10px; border-radius:16px;">
   ${a}
 × ${b}
 ─────
   ${a * b}
                    </pre>
                    <div class="step-text">
                    📖 Таблица умножения:<br>
                    ${a} × ${b} = ${a * b}<br>
                    Запомни: ${a} умножить на ${b} будет ${a * b}
                    </div>
                </div>
            `;
        }
        
        let parts = questionText.split(' ');
        let a = parseInt(parts[0]);
        let op = parts[1];
        let b = parseInt(parts[2]);
        
        if (op === '+') {
            let aUnits = a % 10;
            let bUnits = b % 10;
            let unitsSum = aUnits + bUnits;
            let carry = Math.floor(unitsSum / 10);
            let unitsResult = unitsSum % 10;
            let tensSum = Math.floor(a / 10) + Math.floor(b / 10) + carry;
            
            return `
                <div style="font-family:'Courier New',monospace; text-align:center;">
                    <pre style="background:rgba(0,0,0,0.3); padding:10px; border-radius:16px;">
   ${String(a).padStart(4, ' ')}
 + ${String(b).padStart(4, ' ')}
 ─────
   ${carry > 0 ? String(carry).padStart(4, ' ') : '    '}
   ${String(correctAnswer).padStart(4, ' ')}
                    </pre>
                    <div class="step-text">
                    📖 ПОШАГОВОЕ ОБЪЯСНЕНИЕ:<br>
                    • Складываем единицы: ${aUnits} + ${bUnits} = ${unitsSum}<br>
                    • Пишем ${unitsResult}, ${carry} в уме<br>
                    • Складываем десятки: ${Math.floor(a / 10)} + ${Math.floor(b / 10)} + ${carry} = ${tensSum}<br>
                    • Ответ: ${correctAnswer}
                    </div>
                </div>
            `;
        }
        
        if (op === '-') {
            let aUnits = a % 10;
            let bUnits = b % 10;
            
            if (aUnits < bUnits) {
                let resultUnits = aUnits + 10 - bUnits;
                let aTens = Math.floor(a / 10) - 1;
                let bTens = Math.floor(b / 10);
                let resultTens = aTens - bTens;
                return `
                    <div style="font-family:'Courier New',monospace; text-align:center;">
                        <pre style="background:rgba(0,0,0,0.3); padding:10px; border-radius:16px;">
   ${String(a).padStart(4, ' ')}
 - ${String(b).padStart(4, ' ')}
 ─────
   ${String(correctAnswer).padStart(4, ' ')}
                        </pre>
                        <div class="step-text">
                        📖 ПОШАГОВОЕ ОБЪЯСНЕНИЕ:<br>
                        • ${aUnits} меньше ${bUnits}, занимаем 1 десяток<br>
                        • Единицы: ${aUnits + 10} - ${bUnits} = ${resultUnits}<br>
                        • Десятки: было ${Math.floor(a / 10)}, заняли 1 → осталось ${aTens}<br>
                        • ${aTens} - ${bTens} = ${resultTens}<br>
                        • Ответ: ${correctAnswer}
                        </div>
                    </div>
                `;
            } else {
                let resultUnits = aUnits - bUnits;
                let resultTens = Math.floor(a / 10) - Math.floor(b / 10);
                return `
                    <div style="font-family:'Courier New',monospace; text-align:center;">
                        <pre style="background:rgba(0,0,0,0.3); padding:10px; border-radius:16px;">
   ${String(a).padStart(4, ' ')}
 - ${String(b).padStart(4, ' ')}
 ─────
   ${String(correctAnswer).padStart(4, ' ')}
                        </pre>
                        <div class="step-text">
                        📖 ПОШАГОВОЕ ОБЪЯСНЕНИЕ:<br>
                        • Вычитаем единицы: ${aUnits} - ${bUnits} = ${resultUnits}<br>
                        • Вычитаем десятки: ${Math.floor(a / 10)} - ${Math.floor(b / 10)} = ${resultTens}<br>
                        • Ответ: ${correctAnswer}
                        </div>
                    </div>
                `;
            }
        }
        return "";
    }

    // ==================== ИГРА ====================
    let currentQuestionObj = null, canAnswer = true, gameActive = false, currentScreen = "menu";
    
    function newQuestion() {
        if (!gameActive) return;
        canAnswer = true;
        currentQuestionObj = generateQuestion();
        document.getElementById("question").innerText = currentQuestionObj.text;
        document.getElementById("answerInput").value = "";
        document.getElementById("status").innerHTML = "";
        document.getElementById("explanationBox").classList.add("hidden");
        document.getElementById("checkBtn").disabled = false;
        document.getElementById("answerInput").disabled = false;
        document.getElementById("answerInput").focus();
    }
    
    async function checkAnswer() {
        if (!gameActive || !canAnswer) return;
        let userAnswer = parseInt(document.getElementById("answerInput").value);
        if (isNaN(userAnswer)) {
            document.getElementById("status").innerHTML = "❌ Введи число!";
            document.getElementById("status").className = "status wrong";
            return;
        }
        
        let points = currentDifficulty === "easy" ? 1 : (currentDifficulty === "medium" ? 2 : 0.5);
        canAnswer = false;
        document.getElementById("checkBtn").disabled = true;
        document.getElementById("answerInput").disabled = true;
        
        if (userAnswer === currentQuestionObj.answer) {
            gameData.score += points;
            gameData.correctAnswers++;
            gameData.totalAttempts++;
            addPetExp(1);
            saveData();
            playCorrectSound();
            animatePet("happy");
            document.getElementById("gamePet").innerHTML = `${skins[gameData.currentSkin]?.emoji || "🐦"} Lv.${gameData.petLevel}`;
            document.getElementById("status").innerHTML = `✅ ПРАВИЛЬНО! +${points} балл(а)`;
            document.getElementById("status").className = "status correct";
            document.getElementById("explanationBox").classList.add("hidden");
            updatePetUI();
            setTimeout(() => { if (gameActive) newQuestion(); }, 800);
        } else {
            gameData.totalAttempts++;
            saveData();
            playWrongSound();
            animatePet("sad");
            document.getElementById("status").innerHTML = `❌ НЕПРАВИЛЬНО! Правильный ответ: ${currentQuestionObj.answer}`;
            document.getElementById("status").className = "status wrong";
            
            let explanationHtml = getColumnExplanation(currentQuestionObj.text, currentQuestionObj.answer, userAnswer);
            let expBox = document.getElementById("explanationBox");
            expBox.innerHTML = `<div style="font-weight:bold; margin-bottom:10px;">📖 РЕШЕНИЕ В СТОЛБИК:</div>${explanationHtml}`;
            expBox.classList.remove("hidden");
            
            updatePetUI();
            setTimeout(() => { if (gameActive) newQuestion(); }, 4000);
        }
    }
    
    // ==================== НАВИГАЦИЯ ====================
    function showScreen(screen) {
        document.getElementById("menuScreen").classList.add("hidden");
        document.getElementById("difficultyScreen").classList.add("hidden");
        document.getElementById("gameScreen").classList.add("hidden");
        document.getElementById("shopScreen").classList.add("hidden");
        document.getElementById("profileScreen").classList.add("hidden");
        document.getElementById("settingsScreen").classList.add("hidden");
        if (screen === "menu") document.getElementById("menuScreen").classList.remove("hidden");
        if (screen === "difficulty") document.getElementById("difficultyScreen").classList.remove("hidden");
        if (screen === "game") { document.getElementById("gameScreen").classList.remove("hidden"); gameActive = true; newQuestion(); }
        if (screen === "shop") { document.getElementById("shopScreen").classList.remove("hidden"); renderShop(); }
        if (screen === "profile") { document.getElementById("profileScreen").classList.remove("hidden"); updatePetUI(); }
        if (screen === "settings") { document.getElementById("settingsScreen").classList.remove("hidden"); updateSettingsUI(); }
        currentScreen = screen;
    }
    
    function renderShop() { document.getElementById("shopScore").innerHTML = `⭐ ${gameData.score} баллов`; let skinsGrid=document.getElementById("skinsGrid"), bgGrid=document.getElementById("bgGrid"); skinsGrid.innerHTML=""; for(let [name,skin] of Object.entries(skins)){ let div=document.createElement("div"); div.className="shop-item"; div.innerHTML=`<div class="shop-item-emoji">${skin.emoji}</div><div class="shop-item-name">${name}</div><div class="shop-item-price">💰 ${skin.price}</div>${skin.owned?(gameData.currentSkin===name?'<div class="shop-item-equipped">✅ НАДЕТО</div>':'<div class="shop-item-owned">✅ Владелец</div>'):''}`; if(!skin.owned) div.onclick=()=>buySkin(name); else if(gameData.currentSkin!==name) div.onclick=()=>equipSkin(name); skinsGrid.appendChild(div); }
    bgGrid.innerHTML=""; for(let [id,bg] of Object.entries(backgrounds)){ let div=document.createElement("div"); div.className="shop-item"; div.innerHTML=`<div class="shop-item-emoji">${bg.name.split(" ")[0]}</div><div class="shop-item-name">${bg.name}</div><div class="shop-item-price">💰 ${bg.price}</div>${bg.owned?(gameData.currentBg===id?'<div class="shop-item-equipped">🔵 АКТИВЕН</div>':'<div class="shop-item-owned">✅ Владелец</div>'):''}`; if(!bg.owned) div.onclick=()=>buyBg(id); else if(gameData.currentBg!==id) div.onclick=()=>equipBg(id); bgGrid.appendChild(div); } }
    function buySkin(name){ let skin=skins[name]; if(gameData.score>=skin.price){ gameData.score-=skin.price; skin.owned=true; saveData(); renderShop(); updatePetUI(); playCorrectSound(); }else{ alert(`Не хватает! Нужно ${skin.price} баллов`); playWrongSound(); } }
    function equipSkin(name){ gameData.currentSkin=name; saveData(); renderShop(); updatePetUI(); if(gameActive) document.getElementById("gamePet").innerHTML=`${skins[name].emoji} Lv.${gameData.petLevel}`; animatePet("happy"); }
    function buyBg(id){ let bg=backgrounds[id]; if(gameData.score>=bg.price){ gameData.score-=bg.price; bg.owned=true; saveData(); renderShop(); updatePetUI(); playCorrectSound(); }else alert(`Не хватает! Нужно ${bg.price} баллов`); }
    function equipBg(id){ gameData.currentBg=id; applyTheme(); saveData(); renderShop(); updatePetUI(); }
    function updateSettingsUI(){ updateToggleUI(); let q=document.body.className.match(/quality-(\w+)/)?.[1]||"high"; document.querySelectorAll(".quality-btn").forEach(btn=>{ if(btn.dataset.quality===q) btn.classList.add("active"); else btn.classList.remove("active"); }); }
    function setQuality(q){ let c=document.body.className; c=c.replace(/quality-\w+/,`quality-${q}`); document.body.className=c; saveData(); updateSettingsUI(); }
    function resetBalance(){ if(confirm("ОБНУЛИТЬ ВСЕ БАЛЛЫ?")){ gameData.score=0; saveData(); updatePetUI(); alert("Баллы обнулены!"); } }
    function startGame(diff){ currentDifficulty=diff; gameActive=true; showScreen("game"); }
    
    loadData(); applyTheme(); updatePetUI();
    document.getElementById("playBtn").onclick=()=>showScreen("difficulty");
    document.getElementById("shopBtn").onclick=()=>showScreen("shop");
    document.getElementById("profileBtn").onclick=()=>showScreen("profile");
    document.getElementById("settingsBtn").onclick=()=>showScreen("settings");
    document.getElementById("backToMenuBtn").onclick=()=>showScreen("menu");
    document.getElementById("gameMenuBtn").onclick=()=>{ gameActive=false; showScreen("menu"); };
    document.getElementById("shopBackBtn").onclick=()=>showScreen("menu");
    document.getElementById("profileBackBtn").onclick=()=>showScreen("menu");
    document.getElementById("settingsBackBtn").onclick=()=>showScreen("menu");
    document.getElementById("easyBtn").onclick=()=>startGame("easy");
    document.getElementById("mediumBtn").onclick=()=>startGame("medium");
    document.getElementById("hardBtn").onclick=()=>startGame("hard");
    document.getElementById("checkBtn").onclick=checkAnswer;
    document.getElementById("answerInput").addEventListener("keypress",(e)=>{ if(e.key==="Enter") checkAnswer(); });
    document.getElementById("skinsTabBtn").onclick=()=>{ document.getElementById("skinsGrid").classList.remove("hidden"); document.getElementById("bgGrid").classList.add("hidden"); };
    document.getElementById("bgTabBtn").onclick=()=>{ document.getElementById("skinsGrid").classList.add("hidden"); document.getElementById("bgGrid").classList.remove("hidden"); };
    document.getElementById("musicToggle").onclick=()=>{ musicEnabled=!musicEnabled; updateToggleUI(); saveData(); };
    document.getElementById("sfxToggle").onclick=()=>{ sfxEnabled=!sfxEnabled; updateToggleUI(); saveData(); };
    document.querySelectorAll(".quality-btn").forEach(btn=>btn.onclick=()=>setQuality(btn.dataset.quality));
    document.getElementById("resetBalanceBtn").onclick=resetBalance;
    document.getElementById("renamePetBtn").onclick=()=>{ document.getElementById("newPetName").value=gameData.petName; document.getElementById("renameDialog").style.display="flex"; };
    document.getElementById("saveNameBtn").onclick=()=>{ let nn=document.getElementById("newPetName").value.trim(); if(nn){ gameData.petName=nn; saveData(); updatePetUI(); } document.getElementById("renameDialog").style.display="none"; };
    document.getElementById("cancelNameBtn").onclick=()=>document.getElementById("renameDialog").style.display="none";
    document.getElementById("resetStatsBtn").onclick=()=>{ if(confirm("Сбросить всю статистику?")){ gameData={score:0,correctAnswers:0,totalAttempts:0,petLevel:1,petExp:0,petName:"Пушистик",currentSkin:"🐦 Птица",currentBg:"forest"}; for(let s in skins) skins[s].owned=(s==="🐦 Птица"); for(let b in backgrounds) backgrounds[b].owned=(b==="forest"); saveData(); applyTheme(); updatePetUI(); showScreen("menu"); } };
</script>
</body>
</html>
