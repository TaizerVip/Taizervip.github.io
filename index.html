<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Math Trainer</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            margin: 0;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 450px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
        }

        /* Верхняя панель */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .difficulty-btn {
            background: #313244;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            display: inline-block;
        }

        .difficulty-btn:active {
            opacity: 0.7;
        }

        .score {
            background: #f9e2af;
            color: #1e1e2e;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
        }

        /* Вопрос */
        .question {
            font-size: 64px;
            font-weight: bold;
            color: #89b4fa;
            margin: 30px 0 40px;
            padding: 20px;
            background: #11111b;
            border-radius: 32px;
            letter-spacing: 4px;
        }

        /* Поле ввода */
        .answer-input {
            width: 100%;
            max-width: 200px;
            padding: 16px;
            font-size: 32px;
            text-align: center;
            background: #313244;
            border: none;
            border-radius: 24px;
            color: white;
            font-weight: bold;
            margin: 0 auto 20px;
            display: block;
        }

        .answer-input:focus {
            outline: none;
            ring: 2px solid #89b4fa;
        }

        /* Кнопка */
        .check-btn {
            width: 100%;
            max-width: 250px;
            padding: 16px;
            font-size: 20px;
            font-weight: bold;
            background: #89b4fa;
            color: #1e1e2e;
            border: none;
            border-radius: 48px;
            margin: 10px auto;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            display: block;
        }

        .check-btn:active {
            transform: scale(0.97);
        }

        .check-btn:disabled {
            opacity: 0.5;
            transform: none;
        }

        /* Статус */
        .status {
            margin-top: 24px;
            font-size: 18px;
            font-weight: 500;
            min-height: 60px;
            padding: 8px;
        }

        .correct-text {
            color: #a6e3a1;
        }

        .wrong-text {
            color: #f38ba8;
        }

        /* Кнопка сброса */
        .reset-btn {
            background: #45475a;
            color: #cdd6f4;
            border: none;
            border-radius: 40px;
            padding: 10px 20px;
            font-size: 14px;
            margin-top: 20px;
            cursor: pointer;
        }

        /* Адаптация для телефона */
        @media (max-width: 480px) {
            .question {
                font-size: 48px;
                margin: 20px 0 30px;
            }
            .answer-input {
                font-size: 28px;
                padding: 14px;
            }
            .check-btn {
                padding: 14px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <div class="difficulty-btn" id="difficultyBtn">🟢 Лёгкий</div>
        <div class="score" id="score">⭐ 0</div>
    </div>

    <div class="question" id="question">12 + 8</div>

    <input type="number" id="answer" class="answer-input" placeholder="?" inputmode="numeric" autofocus>

    <button id="checkBtn" class="check-btn">✅ Проверить</button>

    <div class="status" id="status"></div>

    <button id="resetBtn" class="reset-btn">🔄 Сбросить счёт</button>
</div>

<script>
    // --- СОСТОЯНИЕ ИГРЫ ---
    let score = 0;
    let difficulty = 'easy';     // 'easy' или 'medium'
    let currentAnswer = 0;
    let canAnswer = true;         // блокировка во время паузы
    let currentQuestionText = '';

    // Элементы DOM
    const questionEl = document.getElementById('question');
    const answerInput = document.getElementById('answer');
    const checkBtn = document.getElementById('checkBtn');
    const statusEl = document.getElementById('status');
    const scoreEl = document.getElementById('score');
    const difficultyBtn = document.getElementById('difficultyBtn');
    const resetBtn = document.getElementById('resetBtn');

    // --- ЗАГРУЗКА СОХРАНЁННОГО СЧЁТА (из localStorage) ---
    function loadScore() {
        const saved = localStorage.getItem('math_trainer_score');
        if (saved !== null && !isNaN(parseInt(saved))) {
            score = parseInt(saved);
        } else {
            score = 0;
        }
        updateScoreUI();
    }

    function saveScore() {
        localStorage.setItem('math_trainer_score', score);
    }

    function updateScoreUI() {
        scoreEl.textContent = `⭐ ${score}`;
    }

    // --- ГЕНЕРАЦИЯ ПРИМЕРА ---
    function generateQuestion() {
        let a, b;
        if (difficulty === 'easy') {
            a = Math.floor(Math.random() * 90) + 10;   // 10..99
            b = Math.floor(Math.random() * 90) + 10;
        } else {
            a = Math.floor(Math.random() * 900) + 100; // 100..999
            b = Math.floor(Math.random() * 900) + 100;
        }

        const isAddition = Math.random() < 0.5;
        if (isAddition) {
            currentQuestionText = `${a} + ${b}`;
            currentAnswer = a + b;
        } else {
            // Чтобы ответ не был отрицательным
            if (a >= b) {
                currentQuestionText = `${a} - ${b}`;
                currentAnswer = a - b;
            } else {
                currentQuestionText = `${b} - ${a}`;
                currentAnswer = b - a;
            }
        }
        questionEl.textContent = currentQuestionText;
    }

    // --- НОВЫЙ ВОПРОС (очистка и разблокировка) ---
    function newQuestion() {
        canAnswer = true;
        checkBtn.disabled = false;
        answerInput.disabled = false;
        answerInput.value = '';
        statusEl.innerHTML = '';
        // Возвращаем цвет вопроса в обычный
        questionEl.style.color = '#89b4fa';
        generateQuestion();
        answerInput.focus();
    }

    // --- АНИМАЦИЯ ПРАВИЛЬНОГО ОТВЕТА (зелёный цвет) ---
    function correctAnimation() {
        questionEl.style.color = '#a6e3a1';
    }

    // --- ПРОВЕРКА ОТВЕТА ---
    function checkAnswer() {
        if (!canAnswer) return;

        const rawValue = answerInput.value.trim();
        if (rawValue === '') {
            statusEl.innerHTML = '❌ Введи число!';
            statusEl.className = 'status wrong-text';
            return;
        }

        const userAnswer = Number(rawValue);
        if (isNaN(userAnswer)) {
            statusEl.innerHTML = '❌ Введи число!';
            statusEl.className = 'status wrong-text';
            answerInput.value = '';
            return;
        }

        const points = difficulty === 'easy' ? 1 : 2;

        // Блокируем повторные нажатия
        canAnswer = false;
        checkBtn.disabled = true;
        answerInput.disabled = true;

        if (userAnswer === currentAnswer) {
            // ПРАВИЛЬНО
            score += points;
            saveScore();
            updateScoreUI();

            correctAnimation();
            statusEl.innerHTML = `✅ ПРАВИЛЬНО! +${points} балл(а)`;
            statusEl.className = 'status correct-text';

            // Следующий пример через 0.8 секунды
            setTimeout(() => {
                newQuestion();
            }, 800);
        } else {
            // НЕПРАВИЛЬНО
            statusEl.innerHTML = `❌ НЕПРАВИЛЬНО! Ответ: ${currentAnswer}`;
            statusEl.className = 'status wrong-text';

            // Следующий пример через 1.2 секунды
            setTimeout(() => {
                newQuestion();
            }, 1200);
        }
    }

    // --- СМЕНА СЛОЖНОСТИ ---
    function toggleDifficulty() {
        if (!canAnswer) return; // нельзя менять во время паузы

        if (difficulty === 'easy') {
            difficulty = 'medium';
            difficultyBtn.innerHTML = '🟠 Средний';
        } else {
            difficulty = 'easy';
            difficultyBtn.innerHTML = '🟢 Лёгкий';
        }
        // Сбрасываем текущий вопрос
        generateQuestion();
        answerInput.value = '';
        statusEl.innerHTML = '';
        questionEl.style.color = '#89b4fa';
        answerInput.focus();
    }

    // --- СБРОС СЧЁТА ---
    function resetScore() {
        if (!confirm('Сбросить все баллы?')) return;
        score = 0;
        saveScore();
        updateScoreUI();
        statusEl.innerHTML = '📊 Счёт обнулён';
        statusEl.className = 'status';
        setTimeout(() => {
            if (statusEl.innerHTML === '📊 Счёт обнулён') {
                statusEl.innerHTML = '';
            }
        }, 1500);
    }

    // --- НАСТРОЙКА ДЛЯ TELEGRAM MINI APP (опционально) ---
    function setupTelegram() {
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.expand();                 // развернуть на весь экран
            tg.enableClosingConfirmation(); // подтверждение при закрытии
            // Можно также подставить цвет фона
            if (tg.themeParams && tg.themeParams.bg_color) {
                document.body.style.backgroundColor = tg.themeParams.bg_color;
            }
        }
    }

    // --- ИНИЦИАЛИЗАЦИЯ ---
    function init() {
        loadScore();
        generateQuestion();
        setupTelegram();

        // Обработчики событий
        checkBtn.addEventListener('click', checkAnswer);
        difficultyBtn.addEventListener('click', toggleDifficulty);
        resetBtn.addEventListener('click', resetScore);
        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                checkAnswer();
            }
        });

        answerInput.focus();
    }

    // Запускаем игру
    init();
</script>
<script src="https://telegram.org/js/telegram-web-app.js?62"></script>
</body>
</html>
