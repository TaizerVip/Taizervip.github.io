<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🧮 Математический тренажёр — Питомец и магазин</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, sans-serif;
            transition: background 0.3s ease;
        }

        /* Темы */
        body.theme-forest { background: linear-gradient(135deg, #1a472a, #2d6a4f); }
        body.theme-ocean { background: linear-gradient(135deg, #0a2a4a, #1a5a7a); }
        body.theme-space { background: linear-gradient(135deg, #0a0a2a, #2a0a4a); }
        body.theme-desert { background: linear-gradient(135deg, #d4a04a, #f0c060); }
        body.theme-city { background: linear-gradient(135deg, #2a2a3a, #3a3a5a); }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Стеклянные карточки */
        .glass-card {
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Питомец */
        .pet-area {
            text-align: center;
        }
        .pet-emoji {
            font-size: 80px;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.3));
        }
        .pet-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            margin: 5px 0;
        }
        .pet-level {
            font-size: 0.9rem;
            color: #ffd966;
        }
        .progress-bar {
            width: 100%;
            height: 12px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            border-radius: 20px;
            transition: width 0.3s ease;
        }

        /* Кнопки */
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: transform 0.05s linear;
            margin-bottom: 12px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: #ff9f43; color: #1e1a0c; box-shadow: 0 4px 0 #b86f1a; }
        .btn-secondary { background: #45475a; color: white; box-shadow: 0 4px 0 #2a2c3a; }
        .btn-shop { background: #9b59b6; color: white; box-shadow: 0 4px 0 #6c3483; }
        .btn-danger { background: #e74c3c; color: white; box-shadow: 0 4px 0 #a93226; }

        /* Магазин */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 15px;
        }
        .shop-item {
            background: rgba(0,0,0,0.4);
            border-radius: 24px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .shop-item:active { transform: scale(0.96); }
        .shop-item-emoji { font-size: 48px; }
        .shop-item-name { font-size: 0.8rem; color: white; margin: 5px 0; }
        .shop-item-price { font-size: 0.7rem; color: #f9e2af; }
        .shop-item-owned { color: #2ecc71; font-size: 0.7rem; }
        .shop-item-equipped { color: #ff9f43; font-size: 0.7rem; }

        /* Игровая область */
        .question {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            color: white;
            margin: 30px 0;
        }
        .answer-input {
            width: 100%;
            padding: 16px;
            font-size: 28px;
            text-align: center;
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 60px;
            color: white;
            font-weight: bold;
        }
        .answer-input:focus { outline: none; border-color: #ff9f43; }
        .status { text-align: center; margin-top: 15px; font-size: 1rem; }
        .correct { color: #2ecc71; }
        .wrong { color: #e74c3c; }

        /* Статистика */
        .stats-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .score-display {
            font-size: 1.2rem;
            font-weight: bold;
            color: #f9e2af;
        }

        .hidden { display: none; }
    </style>
</head>
<body class="theme-forest">
<div class="container" id="app">
    <!-- МЕНЮ -->
    <div id="menuScreen">
        <div class="glass-card pet-area">
            <div class="pet-emoji" id="petEmoji">🐦</div>
            <div class="pet-name" id="petName">Пушистик</div>
            <div class="pet-level" id="petLevel">Уровень 1</div>
            <div class="progress-bar">
                <div class="progress-fill" id="petProgress" style="width: 0%"></div>
            </div>
            <div class="score-display" id="menuScore">⭐ 0 баллов</div>
        </div>

        <div class="glass-card">
            <button class="btn btn-primary" id="playBtn">🚀 НАЧАТЬ</button>
            <button class="btn btn-shop" id="shopBtn">🛒 МАГАЗИН</button>
            <button class="btn btn-secondary" id="profileBtn">👤 ПРОФИЛЬ</button>
        </div>
    </div>

    <!-- ВЫБОР СЛОЖНОСТИ -->
    <div id="difficultyScreen" class="hidden">
        <div class="glass-card">
            <button class="btn btn-secondary" id="backToMenuBtn">◀ НАЗАД</button>
            <h2 style="color:white; text-align:center; margin:20px 0">Выбери уровень</h2>
            <button class="btn btn-primary" id="easyBtn">🟢 ЛЁГКИЙ (1 балл)</button>
            <button class="btn btn-primary" id="mediumBtn">🟠 СРЕДНИЙ (2 балла)</button>
        </div>
    </div>

    <!-- ИГРА -->
    <div id="gameScreen" class="hidden">
        <div class="glass-card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <button class="btn btn-secondary" style="width: auto; padding: 8px 16px; margin:0" id="gameMenuBtn">◀ МЕНЮ</button>
                <div id="gamePet" style="color:white; font-size:1.2rem">🐦 Lv.1</div>
                <div class="score-display" id="gameScore">⭐ 0</div>
            </div>
            <div class="question" id="question">0 + 0</div>
            <input type="number" id="answerInput" class="answer-input" placeholder="?" autofocus>
            <button class="btn btn-primary" id="checkBtn" style="margin-top: 15px;">✅ ПРОВЕРИТЬ</button>
            <div class="status" id="status"></div>
        </div>
    </div>

    <!-- МАГАЗИН -->
    <div id="shopScreen" class="hidden">
        <div class="glass-card">
            <button class="btn btn-secondary" id="shopBackBtn">◀ НАЗАД</button>
            <div class="score-display" style="text-align:center; margin:10px 0" id="shopScore">⭐ 0 баллов</div>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button class="btn btn-primary" style="flex:1; padding:10px" id="skinsTabBtn">🎭 ПЕРСОНАЖИ</button>
                <button class="btn btn-primary" style="flex:1; padding:10px" id="bgTabBtn">🌍 ФОНЫ</button>
            </div>
            <div id="skinsGrid" class="shop-grid"></div>
            <div id="bgGrid" class="shop-grid hidden"></div>
        </div>
    </div>

    <!-- ПРОФИЛЬ -->
    <div id="profileScreen" class="hidden">
        <div class="glass-card">
            <button class="btn btn-secondary" id="profileBackBtn">◀ НАЗАД</button>
            <div class="pet-area">
                <div class="pet-emoji" id="profilePetEmoji">🐦</div>
                <div class="pet-name" id="profilePetName">Пушистик</div>
                <div class="pet-level" id="profilePetLevel">Уровень 1</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="profilePetProgress" style="width: 0%"></div>
                </div>
            </div>
            <div class="stats-row"><span>⭐ Всего баллов:</span><span id="profileScore">0</span></div>
            <div class="stats-row"><span>✅ Правильных ответов:</span><span id="profileCorrect">0</span></div>
            <div class="stats-row"><span>📊 Всего попыток:</span><span id="profileAttempts">0</span></div>
            <div class="stats-row"><span>📈 Процент успеха:</span><span id="profileAccuracy">0%</span></div>
            <button class="btn btn-secondary" id="renamePetBtn" style="margin-top:15px">🏷️ СМЕНИТЬ ИМЯ</button>
            <button class="btn btn-danger" id="resetStatsBtn">🔄 СБРОСИТЬ СТАТИСТИКУ</button>
        </div>
    </div>

    <!-- Диалог смены имени -->
    <div id="renameDialog" style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:1000">
        <div class="glass-card" style="width:300px">
            <h3 style="color:white; text-align:center">Имя питомца</h3>
            <input type="text" id="newPetName" style="width:100%; padding:12px; margin:15px 0; border-radius:30px; border:none; background:#313244; color:white; text-align:center">
            <button class="btn btn-primary" id="saveNameBtn">СОХРАНИТЬ</button>
            <button class="btn btn-secondary" id="cancelNameBtn">ОТМЕНА</button>
        </div>
    </div>
</div>

<script>
    // ==================== ДАННЫЕ ====================
    let gameData = {
        score: 0,
        correctAnswers: 0,
        totalAttempts: 0,
        petLevel: 1,
        petExp: 0,
        petName: "Пушистик",
        currentSkin: "🐦 Птица",
        currentBg: "forest"
    };

    const skins = {
        "🐦 Птица": { emoji: "🐦", price: 0, owned: true },
        "🐱 Кот": { emoji: "🐱", price: 50, owned: false },
        "🐶 Собака": { emoji: "🐶", price: 50, owned: false },
        "🦊 Лиса": { emoji: "🦊", price: 100, owned: false },
        "🐼 Панда": { emoji: "🐼", price: 150, owned: false },
        "🐸 Лягушка": { emoji: "🐸", price: 80, owned: false },
        "🐧 Пингвин": { emoji: "🐧", price: 120, owned: false },
        "🦄 Единорог": { emoji: "🦄", price: 200, owned: false }
    };

    const backgrounds = {
        forest: { name: "🌲 Лес", price: 0, owned: true },
        ocean: { name: "🌊 Океан", price: 30, owned: false },
        space: { name: "🚀 Космос", price: 50, owned: false },
        desert: { name: "🏜️ Пустыня", price: 40, owned: false },
        city: { name: "🌃 Город", price: 60, owned: false }
    };

    // Загрузка сохранений
    function loadData() {
        const saved = localStorage.getItem("mathTrainerData");
        if (saved) {
            try {
                const data = JSON.parse(saved);
                gameData = { ...gameData, ...data };
                // Загружаем владение скинами
                if (data.ownedSkins) {
                    for (let skin in skins) {
                        if (data.ownedSkins[skin]) skins[skin].owned = true;
                    }
                }
                if (data.ownedBgs) {
                    for (let bg in backgrounds) {
                        if (data.ownedBgs[bg]) backgrounds[bg].owned = true;
                    }
                }
            } catch(e) {}
        }
    }

    function saveData() {
        const toSave = {
            ...gameData,
            ownedSkins: {},
            ownedBgs: {}
        };
        for (let skin in skins) {
            if (skins[skin].owned && skins[skin].price > 0) toSave.ownedSkins[skin] = true;
        }
        for (let bg in backgrounds) {
            if (backgrounds[bg].owned && backgrounds[bg].price > 0) toSave.ownedBgs[bg] = true;
        }
        localStorage.setItem("mathTrainerData", JSON.stringify(toSave));
    }

    // Смена фона
    function applyTheme() {
        const body = document.body;
        body.className = `theme-${gameData.currentBg}`;
    }

    // Опыт питомца
    function addPetExp(amount) {
        gameData.petExp += amount;
        let needed = gameData.petLevel * 10;
        while (gameData.petExp >= needed) {
            gameData.petExp -= needed;
            gameData.petLevel++;
            needed = gameData.petLevel * 10;
            alert(`🎉 ${gameData.petName} достиг ${gameData.petLevel} уровня!`);
        }
        updatePetUI();
        saveData();
    }

    function updatePetUI() {
        const needed = gameData.petLevel * 10;
        const percent = (gameData.petExp / needed) * 100;
        const petEmoji = skins[gameData.currentSkin]?.emoji || "🐦";
        
        document.getElementById("petEmoji").innerText = petEmoji;
        document.getElementById("petName").innerText = gameData.petName;
        document.getElementById("petLevel").innerHTML = `Уровень ${gameData.petLevel} • ${gameData.petExp}/${needed} опыта`;
        document.getElementById("petProgress").style.width = `${percent}%`;
        document.getElementById("menuScore").innerHTML = `⭐ ${gameData.score} баллов`;
        
        if (document.getElementById("profilePetEmoji")) {
            document.getElementById("profilePetEmoji").innerText = petEmoji;
            document.getElementById("profilePetName").innerText = gameData.petName;
            document.getElementById("profilePetLevel").innerHTML = `Уровень ${gameData.petLevel} • ${gameData.petExp}/${needed} опыта`;
            document.getElementById("profilePetProgress").style.width = `${percent}%`;
            document.getElementById("profileScore").innerText = gameData.score;
            document.getElementById("profileCorrect").innerText = gameData.correctAnswers;
            document.getElementById("profileAttempts").innerText = gameData.totalAttempts;
            const accuracy = gameData.totalAttempts > 0 ? ((gameData.correctAnswers / gameData.totalAttempts) * 100).toFixed(1) : 0;
            document.getElementById("profileAccuracy").innerText = `${accuracy}%`;
        }
    }

    // Игровые переменные
    let currentDifficulty = "easy";
    let currentQuestion = "";
    let currentAnswer = 0;
    let canAnswer = true;
    let gameActive = false;
    let currentScreen = "menu";

    function generateQuestion() {
        let a, b;
        if (currentDifficulty === "easy") {
            a = Math.floor(Math.random() * 90) + 10;
            b = Math.floor(Math.random() * 90) + 10;
        } else {
            a = Math.floor(Math.random() * 900) + 100;
            b = Math.floor(Math.random() * 900) + 100;
        }
        if (Math.random() < 0.5) {
            return { text: `${a} + ${b}`, answer: a + b };
        } else {
            if (a >= b) return { text: `${a} - ${b}`, answer: a - b };
            else return { text: `${b} - ${a}`, answer: b - a };
        }
    }

    function newQuestion() {
        if (!gameActive) return;
        canAnswer = true;
        const q = generateQuestion();
        currentQuestion = q.text;
        currentAnswer = q.answer;
        document.getElementById("question").innerText = currentQuestion;
        document.getElementById("answerInput").value = "";
        document.getElementById("status").innerHTML = "";
        document.getElementById("checkBtn").disabled = false;
        document.getElementById("answerInput").disabled = false;
        document.getElementById("answerInput").focus();
    }

    function checkAnswer() {
        if (!gameActive || !canAnswer) return;
        const userAnswer = parseInt(document.getElementById("answerInput").value);
        if (isNaN(userAnswer)) {
            document.getElementById("status").innerHTML = "❌ Введи число!";
            document.getElementById("status").className = "status wrong";
            return;
        }
        const points = currentDifficulty === "easy" ? 1 : 2;
        canAnswer = false;
        document.getElementById("checkBtn").disabled = true;
        document.getElementById("answerInput").disabled = true;
        
        if (userAnswer === currentAnswer) {
            gameData.score += points;
            gameData.correctAnswers++;
            gameData.totalAttempts++;
            addPetExp(1);
            saveData();
            document.getElementById("gameScore").innerHTML = `⭐ ${gameData.score}`;
            document.getElementById("gamePet").innerHTML = `${skins[gameData.currentSkin]?.emoji || "🐦"} Lv.${gameData.petLevel}`;
            document.getElementById("status").innerHTML = `✅ ПРАВИЛЬНО! +${points} балл(а)`;
            document.getElementById("status").className = "status correct";
            setTimeout(() => { if (gameActive) newQuestion(); }, 800);
        } else {
            gameData.totalAttempts++;
            saveData();
            document.getElementById("status").innerHTML = `❌ НЕПРАВИЛЬНО! Ответ: ${currentAnswer}`;
            document.getElementById("status").className = "status wrong";
            setTimeout(() => { if (gameActive) newQuestion(); }, 1200);
        }
        updatePetUI();
    }

    // Навигация
    function showScreen(screen) {
        document.getElementById("menuScreen").classList.add("hidden");
        document.getElementById("difficultyScreen").classList.add("hidden");
        document.getElementById("gameScreen").classList.add("hidden");
        document.getElementById("shopScreen").classList.add("hidden");
        document.getElementById("profileScreen").classList.add("hidden");
        
        if (screen === "menu") document.getElementById("menuScreen").classList.remove("hidden");
        if (screen === "difficulty") document.getElementById("difficultyScreen").classList.remove("hidden");
        if (screen === "game") {
            document.getElementById("gameScreen").classList.remove("hidden");
            gameActive = true;
            newQuestion();
        }
        if (screen === "shop") {
            document.getElementById("shopScreen").classList.remove("hidden");
            renderShop();
        }
        if (screen === "profile") {
            document.getElementById("profileScreen").classList.remove("hidden");
            updatePetUI();
        }
        currentScreen = screen;
    }

    function renderShop() {
        document.getElementById("shopScore").innerHTML = `⭐ ${gameData.score} баллов`;
        // Скины
        const skinsGrid = document.getElementById("skinsGrid");
        skinsGrid.innerHTML = "";
        for (let [name, skin] of Object.entries(skins)) {
            const item = document.createElement("div");
            item.className = "shop-item";
            item.innerHTML = `
                <div class="shop-item-emoji">${skin.emoji}</div>
                <div class="shop-item-name">${name}</div>
                <div class="shop-item-price">💰 ${skin.price}</div>
                ${skin.owned ? (gameData.currentSkin === name ? '<div class="shop-item-equipped">✅ НАДЕТО</div>' : '<div class="shop-item-owned">✅ Владелец</div>') : ''}
            `;
            if (!skin.owned) {
                item.onclick = () => buySkin(name);
            } else if (gameData.currentSkin !== name) {
                item.onclick = () => equipSkin(name);
            }
            skinsGrid.appendChild(item);
        }
        // Фоны
        const bgGrid = document.getElementById("bgGrid");
        bgGrid.innerHTML = "";
        for (let [id, bg] of Object.entries(backgrounds)) {
            const item = document.createElement("div");
            item.className = "shop-item";
            item.innerHTML = `
                <div class="shop-item-emoji">${bg.name.split(" ")[0]}</div>
                <div class="shop-item-name">${bg.name}</div>
                <div class="shop-item-price">💰 ${bg.price}</div>
                ${bg.owned ? (gameData.currentBg === id ? '<div class="shop-item-equipped">🔵 АКТИВЕН</div>' : '<div class="shop-item-owned">✅ Владелец</div>') : ''}
            `;
            if (!bg.owned) {
                item.onclick = () => buyBg(id);
            } else if (gameData.currentBg !== id) {
                item.onclick = () => equipBg(id);
            }
            bgGrid.appendChild(item);
        }
    }

    function buySkin(name) {
        const skin = skins[name];
        if (gameData.score >= skin.price) {
            gameData.score -= skin.price;
            skin.owned = true;
            saveData();
            renderShop();
            updatePetUI();
        } else {
            alert(`Не хватает! Нужно ${skin.price} баллов`);
        }
    }

    function equipSkin(name) {
        gameData.currentSkin = name;
        saveData();
        renderShop();
        updatePetUI();
        if (gameActive) {
            document.getElementById("gamePet").innerHTML = `${skins[name].emoji} Lv.${gameData.petLevel}`;
        }
    }

    function buyBg(id) {
        const bg = backgrounds[id];
        if (gameData.score >= bg.price) {
            gameData.score -= bg.price;
            bg.owned = true;
            saveData();
            renderShop();
            updatePetUI();
        } else {
            alert(`Не хватает! Нужно ${bg.price} баллов`);
        }
    }

    function equipBg(id) {
        gameData.currentBg = id;
        applyTheme();
        saveData();
        renderShop();
        updatePetUI();
    }

    function startGame(difficulty) {
        currentDifficulty = difficulty;
        gameActive = true;
        showScreen("game");
    }

    // Обработчики
    loadData();
    applyTheme();
    updatePetUI();

    document.getElementById("playBtn").onclick = () => showScreen("difficulty");
    document.getElementById("shopBtn").onclick = () => showScreen("shop");
    document.getElementById("profileBtn").onclick = () => showScreen("profile");
    document.getElementById("backToMenuBtn").onclick = () => showScreen("menu");
    document.getElementById("gameMenuBtn").onclick = () => { gameActive = false; showScreen("menu"); };
    document.getElementById("shopBackBtn").onclick = () => showScreen("menu");
    document.getElementById("profileBackBtn").onclick = () => showScreen("menu");
    document.getElementById("easyBtn").onclick = () => startGame("easy");
    document.getElementById("mediumBtn").onclick = () => startGame("medium");
    document.getElementById("checkBtn").onclick = checkAnswer;
    document.getElementById("answerInput").addEventListener("keypress", (e) => { if (e.key === "Enter") checkAnswer(); });
    
    // Вкладки магазина
    document.getElementById("skinsTabBtn").onclick = () => {
        document.getElementById("skinsGrid").classList.remove("hidden");
        document.getElementById("bgGrid").classList.add("hidden");
    };
    document.getElementById("bgTabBtn").onclick = () => {
        document.getElementById("skinsGrid").classList.add("hidden");
        document.getElementById("bgGrid").classList.remove("hidden");
    };
    
    // Смена имени
    document.getElementById("renamePetBtn").onclick = () => {
        document.getElementById("newPetName").value = gameData.petName;
        document.getElementById("renameDialog").style.display = "flex";
    };
    document.getElementById("saveNameBtn").onclick = () => {
        const newName = document.getElementById("newPetName").value.trim();
        if (newName) {
            gameData.petName = newName;
            saveData();
            updatePetUI();
        }
        document.getElementById("renameDialog").style.display = "none";
    };
    document.getElementById("cancelNameBtn").onclick = () => {
        document.getElementById("renameDialog").style.display = "none";
    };
    
    // Сброс статистики
    document.getElementById("resetStatsBtn").onclick = () => {
        if (confirm("Сбросить всю статистику? Баллы и питомец обнулятся!")) {
            gameData = {
                score: 0,
                correctAnswers: 0,
                totalAttempts: 0,
                petLevel: 1,
                petExp: 0,
                petName: "Пушистик",
                currentSkin: "🐦 Птица",
                currentBg: "forest"
            };
            // Сброс владения скинами (кроме стартового)
            for (let skin in skins) {
                skins[skin].owned = (skin === "🐦 Птица");
            }
            for (let bg in backgrounds) {
                backgrounds[bg].owned = (bg === "forest");
            }
            saveData();
            applyTheme();
            updatePetUI();
            showScreen("menu");
        }
    };
</script>
</body>
</html>
